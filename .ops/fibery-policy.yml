version: 1

fibery:
  api_url_env: FIBERY_API_URL
  api_token_env: FIBERY_API_TOKEN
  dry_run_env: FIBERY_SYNC_DRY_RUN

defaults:
  append_only: true
  note_separator: "\n\n---\n\n"

entities:
  issues:
    type: "Unit Talk/Issue"
    lookup_field: "Unit Talk/Identifier"
    note_field: "Unit Talk/Description"
    state_field: "workflow/state"
    state_updates:
      pr_open: "In Review"
      merge: "Done"
  findings:
    type: "Unit Talk/Findings"
    lookup_field: "Unit Talk/Finding ID"
    note_field: "Unit Talk/Notes"
    state_updates: {}
  controls:
    type: "Unit Talk/Controls"
    lookup_field: "Unit Talk/Control ID"
    note_field: "Unit Talk/Notes"
    state_updates: {}
  proofs:
    type: "Unit Talk/Proof Artifacts"
    lookup_field: "Unit Talk/Artifact ID"
    note_field: "Unit Talk/Notes"
    state_updates: {}
