name: Daily Ops Digest

# Runs the ops digest every weekday morning (9:07am PT).
# Surfaces dispatch candidates, stale lanes, and CI failures.
# Discord alert fires automatically when stale_lanes or ci_failures are present
# (handled inside daily-digest.ts via UNIT_TALK_OPS_ALERT_WEBHOOK_URL).
#
# This is the persistent visibility backbone — runs whether or not a Claude
# Code session is open. In-session CronCreate handles actual dispatch execution.

on:
  schedule:
    # 9:07am PT (UTC-8 winter). Off-minute to avoid fleet congestion.
    - cron: '7 17 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    name: Run daily digest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run daily digest
        run: pnpm ops:digest -- --write-result --json | tee /tmp/digest-output.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          LINEAR_TEAM_KEY: UTV2
          UNIT_TALK_OPS_ALERT_WEBHOOK_URL: ${{ secrets.UNIT_TALK_OPS_ALERT_WEBHOOK_URL }}

      - name: Post digest to step summary
        if: always()
        run: |
          echo "## Daily Ops Digest — $(date -u '+%Y-%m-%d')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/digest-output.txt >> "$GITHUB_STEP_SUMMARY" || echo "(no output)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "To dispatch a candidate: \`/dispatch UTV2-###\` in a Claude Code session." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload digest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: |
            /tmp/digest-output.txt
            .out/ops/digest/
          if-no-files-found: ignore
          retention-days: 14
