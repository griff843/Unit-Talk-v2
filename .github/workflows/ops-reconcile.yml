name: Ops Reconcile — Stranded Lane Detection

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # needed to commit manifest mutations

jobs:
  reconcile:
    name: Reconcile stranded lanes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run reconcile
        run: pnpm ops:reconcile -- --apply --json > reconcile-result.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit manifest mutations (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/06_status/lanes/ || true
          if git diff --cached --quiet; then
            echo "No manifest mutations to commit."
          else
            git commit -m "ops(reconcile): auto-block stranded lanes [skip ci]"
            git push
          fi

      - name: Upload reconcile digest
        uses: actions/upload-artifact@v4
        with:
          name: reconcile-result-${{ github.run_id }}.json
          path: reconcile-result.json
          retention-days: 30
