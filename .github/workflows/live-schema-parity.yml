name: Live Schema Parity

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/ops/compare-databases.ts'
      - 'scripts/ci/schema-drift-gate.ts'
      - 'scripts/db-inspect/**'
      - '.github/workflows/live-schema-parity.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'scripts/ops/compare-databases.ts'
      - 'scripts/ci/schema-drift-gate.ts'
      - 'scripts/db-inspect/**'
      - '.github/workflows/live-schema-parity.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Reads the secret in a step (permitted) and outputs a flag.
  # Job-level `if` cannot reference the secrets context directly — this
  # two-job pattern is the supported workaround.
  check-config:
    name: Check DB configuration
    runs-on: ubuntu-latest
    outputs:
      db-configured: ${{ steps.check.outputs.configured }}
      required: ${{ steps.check.outputs.required }}
    steps:
      - id: check
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          # Opt-in enforcement flag (mirrors CI_REQUIRE_DB_SMOKE / required-db-smoke).
          CI_REQUIRE_SCHEMA_PARITY: ${{ vars.CI_REQUIRE_SCHEMA_PARITY }}
        run: |
          # When is parity REQUIRED (fail-closed)? Mirrors scripts/ci/required-db-smoke.ts:
          #   - explicit opt-in flag CI_REQUIRE_SCHEMA_PARITY truthy, OR
          #   - the ref is protected, OR
          #   - the ref is main.
          # On feature-branch PRs (none of the above) a missing secret is a LOUD skip,
          # not a failure. Once the flag is set (after provisioning the SUPABASE_DB_URL
          # secret) a missing/unreachable DB is treated as a FAILURE, never a silent skip.
          required=false
          case "$CI_REQUIRE_SCHEMA_PARITY" in
            1|true|TRUE|yes|YES) required=true ;;
          esac
          if [ "$GITHUB_REF_PROTECTED" = "true" ] || [ "$GITHUB_REF" = "refs/heads/main" ]; then
            required=true
          fi
          echo "required=$required" >> "$GITHUB_OUTPUT"

          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            if [ "$required" = "true" ]; then
              echo "::error title=Live schema parity unverified::SUPABASE_DB_URL is not configured but parity is REQUIRED on this ref. A skip is treated as FAIL (D-CONST-4 / D-CONST-7, fail-closed). Provision the SUPABASE_DB_URL secret."
            else
              echo "::warning title=Live schema parity skipped::SUPABASE_DB_URL not configured — parity not verified on this feature ref. This is a LOUD skip, not a pass."
            fi
          fi

  # D-CONST-7 fail-closed gate: a skipped parity check must never read as a pass.
  # When parity is required (main / protected / CI_REQUIRE_SCHEMA_PARITY) and the DB
  # is not configured, this job FAILS instead of letting schema-parity be skipped.
  enforce-parity-required:
    name: Enforce parity (fail-closed)
    needs: check-config
    if: needs.check-config.outputs.db-configured != 'true' && needs.check-config.outputs.required == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Fail closed — parity required but DB unconfigured
        run: |
          echo "::error title=Live schema parity unverified::Parity is REQUIRED on this ref but SUPABASE_DB_URL is not configured. Per fail-closed doctrine (D-CONST-4/D-CONST-7) a silent skip is treated as FAILURE. Provision the SUPABASE_DB_URL secret to verify live schema parity."
          exit 1

  schema-parity:
    name: Live Schema Parity
    needs: check-config
    if: needs.check-config.outputs.db-configured == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: unit_talk_schema_parity
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d unit_talk_schema_parity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      EXPECTED_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/unit_talk_schema_parity
      ACTUAL_DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for scratch Postgres
        run: |
          for attempt in $(seq 1 20); do
            if pg_isready --dbname "$EXPECTED_DATABASE_URL"; then
              exit 0
            fi
            sleep 3
          done
          echo "::error title=Scratch database unavailable::Postgres service did not become ready."
          exit 1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply repo migrations to scratch database
        run: supabase db push --db-url "$EXPECTED_DATABASE_URL"

      - name: Compare scratch schema to live schema
        id: compare
        continue-on-error: true
        run: >
          pnpm db:compare --
          --expected-db-url "$EXPECTED_DATABASE_URL"
          --actual-db-url "$ACTUAL_DATABASE_URL"
          --expected-label repo-migrations
          --actual-label supabase-live
          --output artifacts/schema-parity/live-schema-parity.json
          --pretty

      - name: Authorize schema drift gate
        if: always()
        run: >
          pnpm ci:schema-drift-gate --
          --report artifacts/schema-parity/live-schema-parity.json
          --artifact-dir artifacts/schema-parity
          --expected-db-url "$EXPECTED_DATABASE_URL"
          --actual-db-url "$ACTUAL_DATABASE_URL"
          --schema public
          --inspect-limit 200

      - name: Upload schema parity artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-schema-parity
          path: artifacts/schema-parity/
          retention-days: 30
          if-no-files-found: warn
