name: Queue Grooming

# Nightly queue grooming: surfaces Ready issues missing tier labels,
# clears blockers whose blocker issue has merged, and flags stale candidates.
# Runs at 2:07am UTC (10:07pm PT) every night.

on:
  schedule:
    - cron: '7 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  groom:
    name: Groom dispatch queue
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run queue grooming
        run: pnpm ops:queue-grooming --json > queue-groom-result.json
        env:
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNIT_TALK_OPS_ALERT_WEBHOOK_URL: ${{ secrets.UNIT_TALK_OPS_ALERT_WEBHOOK_URL }}

      - name: Upload grooming report
        uses: actions/upload-artifact@v4
        with:
          name: queue-groom-report
          path: queue-groom-result.json
          retention-days: 7
