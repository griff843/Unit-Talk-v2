name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write CI local env
        run: |
          cat <<'EOF' > local.env
          NODE_ENV=development
          UNIT_TALK_APP_ENV=ci
          COMMAND_CENTER_AUTH_TOKEN=ci-command-center-token
          AUTH_SECRET=ci-auth-secret
          NEXTAUTH_SECRET=ci-nextauth-secret
          LINEAR_API_TOKEN=
          LINEAR_TEAM_ID=
          NOTION_TOKEN=
          SLACK_BOT_TOKEN=
          SLACK_SIGNING_SECRET=
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_BOT_TOKEN=
          DISCORD_GUILD_ID=
          DISCORD_ANNOUNCEMENT_CHANNEL_ID=
          OPENAI_API_KEY=
          EOF

      - name: Audit production dependencies
        id: audit
        run: pnpm audit --prod --audit-level high

      - name: Verify
        id: verify
        run: pnpm verify

      - name: Command Center tests
        id: command_center
        run: pnpm test:command-center

      - name: Database smoke test
        id: db_smoke
        env:
          CI_REQUIRE_DB_SMOKE: ${{ github.ref_protected || github.ref == 'refs/heads/main' }}
        run: pnpm ci:db-smoke

      - name: CI truth summary
        if: always()
        run: |
          {
            echo "### CI truth gate"
            echo "- verify: ${{ steps.verify.outcome }}"
            echo "- db_smoke: ${{ steps.db_smoke.outcome }}"
            echo "- command_center_tests: ${{ steps.command_center.outcome }}"
            echo "- audit: ${{ steps.audit.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
