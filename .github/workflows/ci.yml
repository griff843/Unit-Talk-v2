name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write CI local env
        run: |
          cat <<'EOF' > local.env
          NODE_ENV=development
          UNIT_TALK_APP_ENV=ci
          COMMAND_CENTER_AUTH_TOKEN=ci-command-center-token
          AUTH_SECRET=ci-auth-secret
          NEXTAUTH_SECRET=ci-nextauth-secret
          LINEAR_API_TOKEN=
          LINEAR_TEAM_ID=
          NOTION_TOKEN=
          SLACK_BOT_TOKEN=
          SLACK_SIGNING_SECRET=
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_BOT_TOKEN=
          DISCORD_GUILD_ID=
          DISCORD_ANNOUNCEMENT_CHANNEL_ID=
          OPENAI_API_KEY=
          EOF

      - name: Audit production dependencies
        id: audit
        run: pnpm audit --prod --audit-level high

      # UTV2-1292: static checks only (lint/type-check/build/local + non-DB tests).
      # Live Supabase proof is isolated into the classified step below, so a
      # transient DB degradation cannot fail this gate as a code failure.
      - name: Verify (static)
        id: verify
        run: pnpm verify:static

      - name: Command Center tests
        id: command_center
        run: pnpm test:command-center

      # UTV2-1292: live-DB proof (test:db + the live t1-proof subset) wrapped by
      # the verdict classifier. It exits non-zero ONLY on a real code failure;
      # transient infrastructure degradation (schema-cache / statement timeout /
      # 520-521 / connection failure) is reported as `infra_unavailable` and does
      # NOT fail this gate. T1 strictness is preserved independently by the
      # fail-closed `T1 Proof Gate` workflow (which runs `ci:db-smoke` for tier:T1).
      - name: Live DB proof (classified)
        id: live_db
        env:
          CI_REQUIRE_DB_SMOKE: ${{ github.ref_protected || github.ref == 'refs/heads/main' }}
        run: pnpm verify:live-db-verdict

      - name: CI truth summary
        if: always()
        run: |
          {
            echo "### CI truth gate"
            echo "- verify_static: ${{ steps.verify.outcome }}"
            echo "- live_db (classified): ${{ steps.live_db.outcome }}"
            echo "- command_center_tests: ${{ steps.command_center.outcome }}"
            echo "- audit: ${{ steps.audit.outcome }}"
            if [ -f live-db-verdict.json ]; then
              echo ""
              echo "Live-DB verdict:"
              echo '```json'
              cat live-db-verdict.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
