name: Fix ingestor API URL and check logs

on:
  workflow_dispatch:

env:
  DEPLOY_HOST: ${{ secrets.UNIT_TALK_DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.UNIT_TALK_DEPLOY_USER }}

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Fix UNIT_TALK_API_URL to use Docker service name
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash << 'SSHEOF'
          set -e
          ENV_FILE="/opt/unit-talk/.env.production"
          echo "--- current UNIT_TALK_API_URL ---"
          grep '^UNIT_TALK_API_URL=' "$ENV_FILE" || echo "(not set)"
          # Replace localhost with Docker service name
          sed -i '/^UNIT_TALK_API_URL=/d' "$ENV_FILE"
          printf 'UNIT_TALK_API_URL=http://api:4000\n' >> "$ENV_FILE"
          echo "--- updated ---"
          grep '^UNIT_TALK_API_URL=' "$ENV_FILE"
          SSHEOF

      - name: Force-recreate ingestor with new env
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/unit-talk && UNIT_TALK_IMAGE_TAG=\$(cat .unit-talk-release) docker compose up -d --force-recreate ingestor"

      - name: Wait for ingestor cycle to complete and check logs
        run: |
          sleep 90
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash << 'SSHEOF'
          echo "=== docker ps ==="
          docker ps --format "table {{.Names}}\t{{.Status}}" | grep unit-talk
          echo ""
          echo "=== ingestor logs since restart (last 50) ==="
          docker logs --tail=50 unit-talk-ingestor-1 2>&1
          SSHEOF