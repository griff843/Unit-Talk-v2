name: Track A Monitor

# Durable replacement for the session-only Track A cron (UTV2-1276).
# Read-only CLV-path watch for UTV2-1250. Runs every 6 hours; posts a Linear
# comment ONLY when a trigger fires (see scripts/ops/track-a-triggers.ts).
#
# Guardrails: read-only DB access, no production mutation, no certification,
# no CLV/ROI/edge claims, no public Discord, no backfill, no secret printing.

on:
  schedule:
    # Every 6 hours at :23 past (off-peak minute).
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    name: Track A CLV-path monitor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Track A monitor (read-only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
        run: |
          mkdir -p artifacts
          pnpm exec tsx scripts/ops/track-a-monitor.ts --output-json artifacts/track-a-monitor.json

      - name: Upload monitor snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: track-a-monitor-snapshot
          path: artifacts/track-a-monitor.json
          retention-days: 14
