# Executor Result Validator
#
# Validates executor completion claims independently. Does NOT trust comment
# content — verifies CI, proof files, and SHA binding via GitHub API.
#
# UTV2-1550: pull_request-triggered evaluation (opened/synchronize/reopened)
# NEVER creates the required "Executor Result Validation" check. GitHub's
# merge-eligibility computation for a required status-check context is
# anchored to the check-suite/run associated with the *original* triggering
# event for a given SHA — a later run with the same context name from a
# different trigger (issue_comment) does not reliably supersede an earlier
# failing pull_request-triggered run under that name. Concretely: pushing a
# new commit re-evaluates any existing (now-stale) executor-result comment
# and can create a *failing* run under the required name before a corrected
# comment is ever posted, and a later successful issue_comment-triggered run
# under the same name did not clear that for merge purposes (root-caused via
# UTV2-1550 on PRs #1227/#1229/#1235: the original pull_request-triggered
# runs stayed the effective blocker even after superseding issue_comment
# runs succeeded; re-running the *original* run's failed jobs is what
# actually cleared the merge block).
#
# Fix: only issue_comment (posting/editing an EXECUTOR_RESULT comment) and
# workflow_dispatch (manual re-run/recovery) ever create the required
# "Executor Result Validation" context. pull_request-triggered runs always
# use the distinct, non-required "Executor Result Preflight" name — so a
# push can never leave a stale failure sitting under the required identity.
# The check-name mapping lives in scripts/ops/executor-result-validate.ts
# (resolveCheckName), covered by scripts/ops/executor-result-validate.test.ts,
# and is looked up here rather than hand-duplicated so the workflow can never
# drift from the tested definition.
#
# Temporary recovery procedure (until this fix is live on a given PR): if a
# PR shows all required checks green but remains merge-blocked, the original
# pull_request-triggered "Executor Result Validation" run for that head may
# still hold a stale failure. Re-run that specific run's failed jobs (Actions
# UI → the run → "Re-run failed jobs" — NOT a new comment/push, which creates
# a separate run under the same pre-fix ambiguity). Once this fix is merged,
# pull_request-triggered runs never touch the required name and this
# procedure is no longer needed.
#
# Spec: docs/05_operations/GOVERNED_LOOP_SPEC.md (sections 2B, 3A, 3D, 3E)

name: Executor Result Validator

on:
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pull_number:
        description: 'PR number to re-validate (recovery/manual re-run path)'
        required: true
        type: number
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  validate:
    name: Executor Result Validator
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, 'EXECUTOR_RESULT:'))
    runs-on: ubuntu-latest
    steps:
      # UTV2-1550 follow-up (Codex P1): pin to the base ref on pull_request
      # events. actions/checkout defaults to the PR's own head/merge ref,
      # which is attacker-controlled -- the "Resolve check name" step below
      # executes scripts/ops/executor-result-validate.ts from whatever gets
      # checked out here, in a job holding checks: write. Pinning the ref to
      # the PR's base SHA (immutable, reachable from main, never PR-supplied)
      # means that script is always the trusted main-branch version regardless
      # of what the PR itself contains. issue_comment/workflow_dispatch runs
      # keep the default github.sha, which already resolves to the base
      # repo's default-branch HEAD for those event types.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve check name (UTV2-1550)
        id: check_name
        run: |
          NAME=$(pnpm exec tsx scripts/ops/executor-result-validate.ts resolve-check-name "${{ github.event_name }}")
          echo "Resolved check name: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Validate executor result
        uses: actions/github-script@v7
        env:
          CHECK_NAME: ${{ steps.check_name.outputs.name }}
        with:
          script: |
            const { selectLatestVerifyCheckRun } = require('./scripts/ops/executor-result-check-selection.cjs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const checkName = process.env.CHECK_NAME;
            let prNumber, headSha, headRef, prLabels;

            // ── 1. Resolve PR ──────────────────────────────────────────
            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              prNumber = pr.number;
              headSha = pr.head.sha;
              headRef = pr.head.ref;
              prLabels = (pr.labels || []).map(l => l.name);
            } else {
              prNumber = context.eventName === 'workflow_dispatch'
                ? parseInt(context.payload.inputs.pull_number, 10)
                : context.payload.issue.number;
              const { data: pr } = await github.rest.pulls.get({
                owner, repo, pull_number: prNumber
              });
              headSha = pr.head.sha;
              headRef = pr.head.ref;
              // Labels are on the issue, not the PR object from pulls.get
              const { data: issue } = await github.rest.issues.get({
                owner, repo, issue_number: prNumber
              });
              prLabels = (issue.labels || []).map(l =>
                typeof l === 'string' ? l : l.name
              );
            }

            // ── 2. Get all PR comments ─────────────────────────────────
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 100
            });

            // ── 3. Parse executor result comments ──────────────────────
            function parseResult(body) {
              if (!body) return null;
              // Strip markdown bold (**key:**) and YAML front-matter fences (---).
              const lines = body.split(/\r?\n/).map(l =>
                l.trim().replace(/^\*\*(.+?)\*\*\s*/, '$1 ').replace(/^---$/, '')
              );
              if (!lines.some(l => l === 'EXECUTOR_RESULT: READY_FOR_REVIEW')) return null;
              if (!lines.some(l => l === 'schema: executor-result/v1')) return null;

              const field = (name) => {
                const re = new RegExp('^' + name + ':\\s+(.+)$', 'i');
                const hit = lines.find(l => re.test(l));
                return hit ? hit.replace(re, '$1').trim() : null;
              };

              return {
                issueId:   field('Issue'),
                lane:      field('Lane'),
                branch:    field('Branch'),
                pr:        field('PR'),
                headSha:   field('Head SHA'),
                proofPath: field('Proof Artifact'),
              };
            }

            const parsed = comments
              .map(c => parseResult(c.body))
              .filter(Boolean);

            // On pull_request with no executor result yet: exit silently.
            // Branch protection keeps the PR blocked via the absent required
            // check (which pull_request never creates anyway — see header).
            if (parsed.length === 0 && context.eventName === 'pull_request') {
              core.info('No executor result comment found. Check stays pending.');
              return;
            }

            // ── 4. Create pending check run on PR HEAD SHA ─────────────
            const { data: check } = await github.rest.checks.create({
              owner, repo,
              name: checkName,
              head_sha: headSha,
              status: 'in_progress',
              started_at: new Date().toISOString()
            });

            const errors = [];

            try {
              if (parsed.length === 0) {
                errors.push('No valid executor-result/v1 comment found on this PR.');
              } else {
                // Use the most recent valid result
                const r = parsed[parsed.length - 1];

                // ── 5. Validate schema fields ──────────────────────────
                if (!r.issueId || !/^(UTV2|UNI)-\d+$/i.test(r.issueId)) {
                  errors.push(`Invalid Issue ID: "${r.issueId || '<missing>'}". Must match UTV2-NNN or UNI-NNN.`);
                }

                if (!r.lane || !['claude', 'codex'].includes(r.lane.toLowerCase())) {
                  errors.push(`Invalid Lane: "${r.lane || '<missing>'}". Must be "claude" or "codex".`);
                }

                const branchRe = /^(claude|codex)\/(utv2|uni)-\d+/i;
                if (!r.branch || !branchRe.test(r.branch)) {
                  errors.push(`Invalid branch: "${r.branch || '<missing>'}". Must match claude/utv2-NNN-*, codex/utv2-NNN-*, claude/uni-NNN-*, or codex/uni-NNN-*.`);
                }
                if (r.branch && r.branch !== headRef) {
                  errors.push(`Branch mismatch: comment declares "${r.branch}", PR head is "${headRef}".`);
                }

                const declaredPR = r.pr ? Number(String(r.pr).replace('#', '')) : null;
                if (!declaredPR || declaredPR !== prNumber) {
                  errors.push(`PR mismatch: comment declares "${r.pr || '<missing>'}", actual is #${prNumber}.`);
                }

                // HEAD SHA — critical for preventing stale results
                if (!r.headSha) {
                  errors.push('Head SHA missing from executor result.');
                } else if (r.headSha !== headSha) {
                  errors.push(`HEAD SHA mismatch: comment has "${r.headSha}", current PR head is "${headSha}". Re-post executor result after pushing.`);
                }

                // ── 6. Determine tier from PR labels ───────────────────
                const tierLabel = prLabels.find(l => /^tier:T[123]$/i.test(l));
                const tier = tierLabel
                  ? tierLabel.split(':')[1].toUpperCase()
                  : null;

                // ── 7. Validate proof file ─────────────────────────────
                const proofPath = r.proofPath;
                const isT3 = tier === 'T3';
                const proofSkipped = !proofPath ||
                  proofPath.toLowerCase() === 'ci only' ||
                  proofPath.toLowerCase() === 'n/a';

                if (proofSkipped && !isT3) {
                  errors.push('Proof Artifact path is required for T1/T2 issues.');
                } else if (!proofSkipped) {
                  try {
                    const { data: file } = await github.rest.repos.getContent({
                      owner, repo, path: proofPath, ref: headSha
                    });

                    if (!file.content) {
                      errors.push(`Proof file is empty: ${proofPath}`);
                    } else {
                      const content = Buffer.from(
                        file.content, 'base64'
                      ).toString('utf-8');

                      if (!content.includes('# PROOF:')) {
                        errors.push('Proof file missing "# PROOF:" header.');
                      }
                      if (!content.includes('MERGE_SHA:')) {
                        errors.push('Proof file missing "MERGE_SHA:" field.');
                      } else {
                        const shaMatch = content.match(
                          /^MERGE_SHA:\s*(.+)$/m
                        );
                        const fileSha = shaMatch
                          ? shaMatch[1].trim()
                          : null;
                        if (!fileSha || !/^[0-9a-f]{7,40}$/i.test(fileSha)) {
                          errors.push(
                            `Proof MERGE_SHA is not a valid git SHA: "${fileSha}".`
                          );
                        } else {
                          // MERGE_SHA must be an ancestor of (or equal to) the PR HEAD.
                          // This allows proof files to reference the implementation commit
                          // SHA rather than their own commit SHA, avoiding the SHA
                          // preimage circular dependency.
                          try {
                            const cmp = await github.rest.repos.compareCommits({
                              owner, repo, base: fileSha, head: headSha
                            });
                            // status "ahead" means headSha is ahead of fileSha — valid ancestor
                            // status "identical" means they are the same commit — also valid
                            if (!['ahead', 'identical'].includes(cmp.data.status)) {
                              errors.push(
                                `Proof MERGE_SHA "${fileSha}" is not an ancestor of PR HEAD "${headSha}" (compare status: ${cmp.data.status}).`
                              );
                            }
                          } catch (e) {
                            errors.push(
                              `Could not verify MERGE_SHA "${fileSha}": ${e.message}`
                            );
                          }
                        }
                      }
                      if (!content.includes('ASSERTIONS:')) {
                        errors.push(
                          'Proof file missing "ASSERTIONS:" section.'
                        );
                      } else {
                        const assertionCount = (
                          content.match(/^- \[[ x]\]/gm) || []
                        ).length;
                        if (assertionCount < 1) {
                          errors.push(
                            'Proof file has no assertions (need at least one "- [ ]" or "- [x]" item).'
                          );
                        }
                      }
                      if (!content.includes('EVIDENCE:')) {
                        errors.push(
                          'Proof file missing "EVIDENCE:" section.'
                        );
                      } else {
                        const fenceCount = (
                          content.match(/^```/gm) || []
                        ).length;
                        if (fenceCount < 2) {
                          errors.push(
                            'Proof file EVIDENCE section has no fenced code blocks.'
                          );
                        }
                      }

                      // Reject uppercase placeholders (case-sensitive to avoid false
                      // positives from test runner output like "ℹ todo 0").
                      if (/\b(TODO|TBD|FIXME|PLACEHOLDER|<fill-in>)\b/.test(content)) {
                        errors.push(
                          'Proof file contains placeholder text (TODO/TBD/FIXME).'
                        );
                      }
                    }
                  } catch (e) {
                    errors.push(`Proof file not found at "${proofPath}" on HEAD SHA ${headSha}.`);
                  }
                }

                // ── 8. Verify CI on exact HEAD SHA ─────────────────────
                // UTV2-1573: paginate across every page of check-runs for
                // this commit. GitHub's Checks API defaults to 30 per page;
                // this repo routinely accumulates 60-100+ check-runs on a
                // single commit (dozens of required/advisory workflows and
                // matrix jobs), so an unpaginated call can miss a real,
                // completed, successful "verify" run just because it fell
                // outside the first page -- a false-negative that fails this
                // required check for reasons unrelated to the PR's actual
                // state. `github.paginate` walks every page (no upper
                // bound); `filter: 'latest'` keeps only the newest run per
                // check-run name+app so re-runs and duplicate checks don't
                // inflate the fetched set.
                const allCheckRuns = await github.paginate(github.rest.checks.listForRef, {
                  owner, repo, ref: headSha, per_page: 100, filter: 'latest'
                });

                // Deterministically select the newest "verify" run from the
                // github-actions app -- see scripts/ops/executor-result-check-selection.cjs
                // and its test suite for the exact selection semantics.
                const ciRun = selectLatestVerifyCheckRun(allCheckRuns);

                if (!ciRun) {
                  errors.push(
                    `CI check "verify" not found on HEAD SHA ${headSha}. Wait for CI to complete.`
                  );
                } else if (ciRun.status !== 'completed') {
                  errors.push(
                    `CI check is ${ciRun.status}, not completed. Wait for CI to finish.`
                  );
                } else if (ciRun.conclusion !== 'success') {
                  errors.push(
                    `CI conclusion is "${ciRun.conclusion}", not "success". Fix CI before requesting review.`
                  );
                }
              }
            } catch (e) {
              errors.push(`Internal validation error: ${e.message}`);
            }

            // ── 9. Complete check run ──────────────────────────────────
            const passed = errors.length === 0;
            const isRequired = checkName !== 'Executor Result Preflight';

            await github.rest.checks.update({
              owner, repo,
              check_run_id: check.id,
              status: 'completed',
              conclusion: passed ? 'success' : 'failure',
              completed_at: new Date().toISOString(),
              output: {
                title: passed
                  ? `${checkName}: VALID`
                  : `${checkName}: INVALID`,
                summary: passed
                  ? 'All independent checks passed. Proof verified, CI green on exact HEAD SHA.'
                  : `**Validation failed:**\n\n${errors.map(e => '- ' + e).join('\n')}` +
                    (isRequired ? '' : '\n\n_This is the non-required preflight check (pull_request-triggered). It never blocks merge — post a corrected executor-result comment to re-run the required validation._')
              }
            });

            // Post failure comment for visibility (fail loud) — only for the
            // required check. The preflight already surfaces its findings on
            // the check run itself; commenting on every push before an
            // executor-result comment even exists would be noisy and, per
            // UTV2-1550, silence at parsed.length===0 is intentional above.
            if (!passed && isRequired) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: [
                  '**EXECUTOR RESULT VALIDATION: FAILED**',
                  '',
                  ...errors.map(e => '- ' + e),
                  '',
                  'Fix the above and re-post the executor result comment.'
                ].join('\n')
              });
            }
            if (!passed && isRequired) {
              core.setFailed('Executor result validation failed.');
            } else if (!passed) {
              core.warning(`Executor Result Preflight failed (non-blocking): ${errors.join('; ')}`);
            }
