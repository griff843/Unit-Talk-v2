name: Ops — Ingestor Diagnose

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DEPLOY_HOST: ${{ secrets.UNIT_TALK_DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.UNIT_TALK_DEPLOY_USER }}
  DEPLOY_PATH: ${{ secrets.UNIT_TALK_DEPLOY_PATH }}

jobs:
  diagnose:
    name: Diagnose ingestor container
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          missing=()
          test -n "$DEPLOY_HOST" || missing+=(UNIT_TALK_DEPLOY_HOST)
          test -n "$DEPLOY_USER" || missing+=(UNIT_TALK_DEPLOY_USER)
          test -n "$DEPLOY_PATH" || missing+=(UNIT_TALK_DEPLOY_PATH)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Required secrets not configured: ${missing[*]}"
            exit 1
          fi

      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_SSH_KEY" || { echo "ERROR: UNIT_TALK_DEPLOY_SSH_KEY not configured"; exit 1; }
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Run diagnostics
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            DEPLOY_PATH='$DEPLOY_PATH'
            echo '=== CONTAINER STATUS ==='
            docker ps --filter name=unit-talk-ingestor-1 --format 'table {{.Names}}\t{{.Status}}\t{{.RestartCount}}'

            echo ''
            echo '=== CONTAINER INSPECT ==='
            docker inspect unit-talk-ingestor-1 --format '{{.State.Status}} restarts={{.RestartCount}} health={{if .State.Health}}{{.State.Health.Status}}{{end}}' 2>/dev/null || echo 'Container not found'

            echo ''
            echo '=== LAST 100 LOG LINES ==='
            docker logs unit-talk-ingestor-1 --tail 100 2>&1 || echo 'No logs available'

            echo ''
            echo '=== ENV FILE CHECK ==='
            ls -la \"\$DEPLOY_PATH/.env.production\" 2>/dev/null || echo 'MISSING: .env.production does not exist'

            echo ''
            echo '=== SGO_API_KEY CHECK ==='
            grep -c 'SGO_API_KEY' \"\$DEPLOY_PATH/.env.production\" 2>/dev/null && echo 'SGO_API_KEY present' || echo 'SGO_API_KEY MISSING from .env.production'
          " | tee ingestor-diagnose-${{ github.run_id }}.txt

      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestor-diagnose-${{ github.run_id }}.txt
          path: ingestor-diagnose-${{ github.run_id }}.txt
          retention-days: 30
