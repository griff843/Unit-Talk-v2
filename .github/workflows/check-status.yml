name: Check server service status

on:
  workflow_dispatch:

env:
  DEPLOY_HOST: ${{ secrets.UNIT_TALK_DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.UNIT_TALK_DEPLOY_USER }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Check all container statuses and bot logs
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash << 'SSHEOF'
          echo "=== docker ps ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | grep unit-talk
          echo ""
          echo "=== discord-bot logs (last 30) ==="
          docker logs --tail=30 unit-talk-discord-bot-1 2>&1
          echo ""
          echo "=== ingestor logs (last 10) ==="
          docker logs --tail=10 unit-talk-ingestor-1 2>&1
          echo ""
          echo "=== api health ==="
          curl -sf http://localhost:4000/health | python3 -c "import json,sys; d=json.load(sys.stdin); print('status:', d.get('status')); print('db:', d.get('dbReachable')); print('mode:', d.get('runtimeMode'))"
          SSHEOF