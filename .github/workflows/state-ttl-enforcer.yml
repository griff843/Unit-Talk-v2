# State TTL Enforcer
#
# Runs on a schedule to detect stale PRs and enforce TTL rules from the
# governed loop spec. Posts comments and applies labels on TTL violations.
#
# TTLs (from GOVERNED_LOOP_SPEC.md section 2D):
#   Dispatched:        10 min  -> return to Ready + dispatch:failed
#   In Build:          24 hours -> move to Failed + needs-reframe + pm-triage
#   Ready for Review:  48 hours -> notify PM + review:stale
#   Changes Requested: 24 hours -> move to Failed + needs-reframe + pm-triage
#   Approved:           4 hours -> notify PM + merge:overdue
#
# Uses PR labels for state tracking (state:* labels).
# Uses issue updated_at as TTL start time (best available without custom state store).

name: State TTL Enforcer

on:
  schedule:
    # Every 4 hours — catches 24h and 48h TTLs. Dispatched 10-min TTL
    # is enforced by discipline in Phase 0; scheduled enforcement is
    # advisory at this cadence.
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  enforce:
    name: Enforce state TTLs
    runs-on: ubuntu-latest
    steps:
      - name: Check open PRs for TTL violations
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = Date.now();

            function hoursSince(dateStr) {
              return (now - new Date(dateStr).getTime()) / 3600000;
            }

            function minutesSince(dateStr) {
              return (now - new Date(dateStr).getTime()) / 60000;
            }

            function getLabels(issue) {
              return (issue.labels || [])
                .map(l => typeof l === 'string' ? l : l.name)
                .filter(Boolean);
            }

            function hasLabel(labels, name) {
              return labels.includes(name);
            }

            async function addLabels(issueNumber, newLabels) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNumber, labels: newLabels
              });
            }

            async function removeLabel(issueNumber, label) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issueNumber, name: label
                });
              } catch (e) {
                // Label might not exist — ignore
              }
            }

            async function postComment(issueNumber, body) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber, body
              });
            }

            // Get all open PRs
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 100
            });

            let violations = 0;

            for (const pr of prs) {
              const { data: issue } = await github.rest.issues.get({
                owner, repo, issue_number: pr.number
              });
              const labels = getLabels(issue);
              const staleRef = issue.updated_at;

              // Skip PRs with governance:pause label
              if (hasLabel(labels, 'governance:pause')) {
                core.info(`#${pr.number}: governance:pause — skipped.`);
                continue;
              }

              // ── Dispatched > 10 min ──────────────────────────────
              if (hasLabel(labels, 'state:Dispatched')) {
                if (minutesSince(staleRef) > 10) {
                  violations++;
                  core.warning(
                    `#${pr.number}: Dispatched TTL expired (${Math.round(minutesSince(staleRef))} min).`
                  );
                  await removeLabel(pr.number, 'state:Dispatched');
                  await addLabels(pr.number, ['state:Ready', 'dispatch:failed']);
                  await postComment(pr.number, [
                    '**TTL EXPIRED: Dispatched > 10 minutes**',
                    '',
                    'No executor ACK received within TTL window.',
                    'Returning to `Ready` for re-dispatch.',
                    '',
                    'Label applied: `dispatch:failed`'
                  ].join('\n'));
                }
              }

              // ── In Build > 24 hours ──────────────────────────────
              if (hasLabel(labels, 'state:In Build')) {
                if (hoursSince(staleRef) > 24) {
                  violations++;
                  core.warning(
                    `#${pr.number}: In Build TTL expired (${Math.round(hoursSince(staleRef))}h).`
                  );
                  await removeLabel(pr.number, 'state:In Build');
                  await addLabels(pr.number, [
                    'state:Failed', 'needs-reframe', 'pm-triage'
                  ]);
                  await postComment(pr.number, [
                    '**TTL EXPIRED: In Build > 24 hours**',
                    '',
                    'Executor did not complete within TTL window.',
                    'Moving to `Failed` for PM triage.',
                    '',
                    'Labels applied: `needs-reframe`, `pm-triage`',
                    '',
                    'PM must re-scope, close, or reassign before this issue can re-enter the workflow.'
                  ].join('\n'));
                }
              }

              // ── Ready for Review > 48 hours ──────────────────────
              if (hasLabel(labels, 'state:Ready for Review')) {
                if (hoursSince(staleRef) > 48) {
                  violations++;
                  core.warning(
                    `#${pr.number}: Ready for Review TTL expired (${Math.round(hoursSince(staleRef))}h).`
                  );
                  if (!hasLabel(labels, 'review:stale')) {
                    await addLabels(pr.number, ['review:stale']);
                  }
                  await postComment(pr.number, [
                    '**TTL WARNING: Ready for Review > 48 hours**',
                    '',
                    'This PR has been awaiting PM review for over 48 hours.',
                    '@griff843 — review required.',
                    '',
                    'Label applied: `review:stale`'
                  ].join('\n'));
                }
              }

              // ── Changes Requested > 24 hours ─────────────────────
              if (hasLabel(labels, 'state:Changes Requested')) {
                if (hoursSince(staleRef) > 24) {
                  violations++;
                  core.warning(
                    `#${pr.number}: Changes Requested TTL expired (${Math.round(hoursSince(staleRef))}h).`
                  );
                  await removeLabel(pr.number, 'state:Changes Requested');
                  await addLabels(pr.number, [
                    'state:Failed', 'needs-reframe', 'pm-triage'
                  ]);
                  await postComment(pr.number, [
                    '**TTL EXPIRED: Changes Requested > 24 hours**',
                    '',
                    'Executor did not address requested changes within TTL.',
                    'Moving to `Failed` for PM triage.',
                    '',
                    'Labels applied: `needs-reframe`, `pm-triage`'
                  ].join('\n'));
                }
              }

              // ── Approved > 4 hours ───────────────────────────────
              if (hasLabel(labels, 'state:Approved')) {
                if (hoursSince(staleRef) > 4) {
                  violations++;
                  core.warning(
                    `#${pr.number}: Approved TTL expired (${Math.round(hoursSince(staleRef))}h).`
                  );
                  if (!hasLabel(labels, 'merge:overdue')) {
                    await addLabels(pr.number, ['merge:overdue']);
                  }
                  await postComment(pr.number, [
                    '**TTL WARNING: Approved > 4 hours without merge**',
                    '',
                    'This PR was approved but has not been merged.',
                    '@griff843 — merge or block.',
                    '',
                    'Label applied: `merge:overdue`'
                  ].join('\n'));
                }
              }
            }

            core.info(`TTL enforcement complete. ${violations} violation(s) found across ${prs.length} open PRs.`);
