name: Tier Label Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  issues: write

jobs:
  check-tier-label:
    name: Sync tier label
    runs-on: ubuntu-latest
    steps:
      # P1 fix (UTV2-1551 follow-up): this job runs on `pull_request`, which
      # means GitHub Actions executes this job using the PR's OWN copy of
      # this workflow file -- not main's. A privileged secret must never be
      # reachable from a step in this job, because a malicious same-repo PR
      # could rewrite the step's `script:` to exfiltrate or misuse it before
      # any review happens. This job therefore holds only the default
      # GITHUB_TOKEN and never references SYNC_BOT_TOKEN. It only computes
      # the label plan (read-only) and uploads it as an artifact. The actual
      # label mutation -- which needs SYNC_BOT_TOKEN so its
      # `labeled`/`unlabeled` event cascades to trigger Merge Gate -- is
      # applied by the separate tier-label-apply.yml workflow, which runs on
      # `workflow_run`: a trigger GitHub always evaluates using the base
      # branch's own copy of that workflow file (never the PR's), and which
      # never checks out or executes any PR-controlled code.
      - name: Resolve authoritative tier and compute label plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name).filter(Boolean);
            const issueMatch = pr.head.ref.match(/(?:^|\/)((?:utv2|uni)-\d+)/i) ||
              (pr.title || '').match(/((?:UTV2|UNI)-\d+)/i);
            const issueId = issueMatch ? issueMatch[1].toUpperCase() : null;

            if (!issueId) {
              core.setFailed('No issue ID found in PR branch or title. Cannot resolve authoritative tier.');
              return;
            }

            async function readManifest(ref) {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: `docs/06_status/lanes/${issueId}.json`,
                  ref,
                });
                if (Array.isArray(data) || !data.content) return null;
                return JSON.parse(Buffer.from(data.content, data.encoding || 'base64').toString('utf8'));
              } catch (error) {
                if (error.status === 404) return null;
                throw error;
              }
            }

            const manifest = await readManifest(pr.head.sha) || await readManifest(pr.base.sha);
            const tier = manifest && /^(T1|T2|T3)$/.test(String(manifest.tier))
              ? String(manifest.tier).toUpperCase()
              : null;

            if (!tier) {
              core.setFailed(
                `No authoritative tier found for ${issueId}. ` +
                'GitHub tier labels are evidence only; add/fix the lane manifest tier from Linear.'
              );
              return;
            }

            if (manifest.issue_id && String(manifest.issue_id).toUpperCase() !== issueId) {
              core.setFailed(`Lane manifest issue_id ${manifest.issue_id} does not match PR issue ${issueId}.`);
              return;
            }

            const expected = `tier:${tier}`;
            const tierLabels = labels.filter(l => /^tier:T[123]$/i.test(l));
            const normalizedTierLabels = [...new Set(tierLabels.map(l => {
              const match = l.match(/^tier:(T[123])$/i);
              return `tier:${match[1].toUpperCase()}`;
            }))];

            const labelsToAdd = [];
            const labelsToRemove = [];
            let mismatchOnly = false;

            if (normalizedTierLabels.length === 0) {
              labelsToAdd.push(expected);
            } else {
              const unexpected = normalizedTierLabels.filter(l => l !== expected);
              if (unexpected.length > 0 || normalizedTierLabels.length > 1) {
                labelsToRemove.push(...unexpected);
                if (!normalizedTierLabels.includes(expected)) {
                  labelsToAdd.push(expected);
                }
              } else if (normalizedTierLabels[0] !== expected) {
                mismatchOnly = true;
              }
            }

            if (mismatchOnly) {
              core.setFailed(`Tier mismatch: authoritative ${expected}, PR has ${normalizedTierLabels[0]}.`);
              return;
            }

            // Strict allowlist validation before this plan ever leaves this
            // job. The privileged consumer re-validates independently too
            // (defense in depth), but nothing invalid should even be
            // written to the artifact.
            const validLabel = (l) => /^tier:T[123]$/.test(l);
            if (!labelsToAdd.every(validLabel) || !labelsToRemove.every(validLabel)) {
              core.setFailed('Internal error: computed a non-tier label. Refusing to emit label plan.');
              return;
            }
            if (!/^(?:UTV2|UNI)-\d+$/.test(issueId)) {
              core.setFailed('Internal error: issueId failed strict format validation.');
              return;
            }

            const plan = {
              schema: 'tier-label-plan/v1',
              pr_number: pr.number,
              head_sha: pr.head.sha,
              issue_id: issueId,
              tier,
              labels_to_add: labelsToAdd,
              labels_to_remove: labelsToRemove,
            };
            fs.mkdirSync('.tier-label-plan', { recursive: true });
            fs.writeFileSync('.tier-label-plan/plan.json', JSON.stringify(plan, null, 2));

            if (labelsToAdd.length > 0 || labelsToRemove.length > 0) {
              core.setFailed(
                `Tier label drift detected for ${issueId}: authoritative ${expected}, ` +
                `PR has ${normalizedTierLabels.join(', ') || '(none)'}. ` +
                'tier-label-apply.yml will apply the correction once this run completes; re-check after it does.'
              );
              return;
            }

            core.notice(`Tier label consistent: ${expected} mirrors lane manifest for ${issueId}.`);

      - name: Upload label plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier-label-plan-${{ github.event.pull_request.number }}
          path: .tier-label-plan/plan.json
          retention-days: 1
          if-no-files-found: ignore

      - name: Comment on blocked tier state
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '**Tier label synchronization blocked**',
              '',
              'GitHub tier labels are required evidence, but they are not authoritative.',
              'Fix the Linear/lane manifest tier first; automation will mirror the matching `tier:T*` label.',
              '',
              'PM is not required to manually apply or reapply the GitHub tier label.'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Tier label synchronization blocked')
            );

            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
