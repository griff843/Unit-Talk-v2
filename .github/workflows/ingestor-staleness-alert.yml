name: Ingestor Staleness Alert

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check provider-offer freshness
        run: pnpm ingestor:alert-check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UNIT_TALK_INGESTOR_OFFER_STALE_MINUTES: ${{ vars.UNIT_TALK_INGESTOR_OFFER_STALE_MINUTES || '30' }}
          INGESTOR_ALERT_CYCLE_THRESHOLD_MINUTES: ${{ vars.INGESTOR_ALERT_CYCLE_THRESHOLD_MINUTES || '30' }}
          INGESTOR_ALERT_RESULTS_THRESHOLD_MINUTES: ${{ vars.INGESTOR_ALERT_RESULTS_THRESHOLD_MINUTES || '60' }}
          UNIT_TALK_OPS_ALERT_WEBHOOK_URL: ${{ secrets.UNIT_TALK_OPS_ALERT_WEBHOOK_URL }}
