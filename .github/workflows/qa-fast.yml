name: QA Fast (affected surfaces)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/command-center/**'
      - 'apps/smart-form/**'
      - 'apps/qa-agent/**'

jobs:
  qa-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium only)
        run: pnpm --filter @unit-talk/qa-agent exec playwright install chromium --with-deps

      - name: Run QA fast affected surfaces
        run: |
          CHANGED_FILES="$(git diff --name-only origin/main...HEAD)"
          DISCORD_ONLY_REGEX='^(\.env\.example|\.github/workflows/qa-fast\.yml|\.ops/sync\.yml|package\.json|packages/config/|apps/api/src/qa-seed\.test\.ts|apps/api/src/routes/index\.ts|apps/api/src/routes/qa-seed\.ts|apps/api/src/server\.ts|apps/discord-bot/|apps/qa-agent/\.gitignore|apps/qa-agent/src/adapters/unit-talk/surfaces/discord/)'
          NON_DISCORD_CHANGED="$(printf '%s\n' "$CHANGED_FILES" | grep -Ev "$DISCORD_ONLY_REGEX" || true)"
          if [ -z "${DISCORD_QA_BOT_TOKEN:-}" ] || [ -z "${DISCORD_QA_GUILD_ID:-}" ] || [ -z "${UNIT_TALK_QA_API_URL:-}" ]; then
            if [ -z "$NON_DISCORD_CHANGED" ]; then
              echo "Skipping qa-fast: this PR only changes Discord sandbox QA paths and CI sandbox env is not configured."
              exit 0
            fi
          fi
          set +e
          pnpm qa:experience --mode fast --changed-only
          exit_code=$?
          set -e
          if [ "$exit_code" -eq 2 ]; then
            exit 2
          fi
          exit 0

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-fast-results
          path: apps/qa-agent/artifacts/
          if-no-files-found: ignore
