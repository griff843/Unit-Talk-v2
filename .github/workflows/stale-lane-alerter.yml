name: Stale Lane Alerter

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  alert:
    name: Check stale lanes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run stale lane alerter
        run: pnpm ops:lane-alert -- --write-result --json > lane-drift-result.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          UNIT_TALK_OPS_ALERT_WEBHOOK_URL: ${{ secrets.UNIT_TALK_OPS_ALERT_WEBHOOK_URL }}

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: lane-drift-result.json
          path: lane-drift-result.json
          retention-days: 14
