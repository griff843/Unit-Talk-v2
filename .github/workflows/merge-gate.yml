# Merge Gate
#
# THE tier-aware policy engine for merge authorization on main.
# Branch protection defers review policy to this check — no universal
# PR review is required at the branch level.
#
# Reads tier from PR labels (human-assigned only). Verifies PM verdict
# is from an authorized CODEOWNERS member. Fail-closed: no tier label
# or missing approval = no merge.
#
# T1: requires t1-approved label + PM_VERDICT: APPROVED from CODEOWNERS
# T2: requires GitHub PR review approval (Claude `gh pr review --approve` satisfies this — no PM_VERDICT)
# T3: passes automatically (CI + executor-result-validator are separate gates)
#
# governance:pause label on PR = hard block regardless of tier.
#
# Spec: docs/05_operations/GOVERNED_LOOP_SPEC.md (sections 2C, 3B, 4B)

name: Merge Gate

on:
  workflow_dispatch:
    inputs:
      pull_number:
        description: 'PR number to re-evaluate (for P0 lanes where self-approval is structurally blocked)'
        required: true
        type: number
  pull_request:
    types: [synchronize, reopened, labeled, unlabeled, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  gate:
    name: Merge Gate
    concurrency:
      group: merge-gate-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, 'PM_VERDICT:'))
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate merge gate
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Authorized PM reviewers — must match .github/CODEOWNERS
            const AUTHORIZED_REVIEWERS = new Set(['griff843']);

            // ── 1. Resolve PR ──────────────────────────────────────────
            let prNumber, headSha;
            if (context.eventName === 'pull_request' ||
                context.eventName === 'pull_request_review') {
              const pr = context.payload.pull_request;
              prNumber = pr.number;
              headSha = pr.head.sha;
            } else if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt(context.payload.inputs.pull_number, 10);
              const { data: pr } = await github.rest.pulls.get({
                owner, repo, pull_number: prNumber
              });
              headSha = pr.head.sha;
            } else {
              prNumber = context.payload.issue.number;
              const { data: pr } = await github.rest.pulls.get({
                owner, repo, pull_number: prNumber
              });
              headSha = pr.head.sha;
            }

            // ── 2. Create pending check run ────────────────────────────
            const { data: check } = await github.rest.checks.create({
              owner, repo,
              name: 'Merge Gate',
              head_sha: headSha,
              status: 'in_progress',
              started_at: new Date().toISOString()
            });

            const errors = [];

            try {
              // ── 3. Get PR labels ───────────────────────────────────
              const { data: issue } = await github.rest.issues.get({
                owner, repo, issue_number: prNumber
              });
              const labels = (issue.labels || []).map(l =>
                typeof l === 'string' ? l : l.name
              ).filter(Boolean);

              // ── 4. Detect tier from labels ─────────────────────────
              const tierLabels = labels.filter(l =>
                /^tier:T[123]$/i.test(l)
              );

              if (tierLabels.length === 0) {
                errors.push(
                  'No tier label found. Add exactly one of: tier:T1, tier:T2, tier:T3.'
                );
              } else if (tierLabels.length > 1) {
                errors.push(
                  `Multiple tier labels found: ${tierLabels.join(', ')}. Must have exactly one.`
                );
              }

              // ── 4b. Kill switch ──────────────────────────────────
              if (labels.includes('governance:pause')) {
                errors.push(
                  'governance:pause label is active. All merges blocked until removed by PM.'
                );
              }

              if (errors.length > 0) {
                // Can't proceed without valid tier / kill switch
                throw new Error('Tier validation failed');
              }

              const tier = tierLabels[0].split(':')[1].toUpperCase();

              // ── 5. T3: auto-pass ────────────────────────────────────
              // T3 merges on green CI + valid executor result (separate
              // required checks). No PM verdict needed.
              if (tier === 'T3') {
                await github.rest.checks.update({
                  owner, repo,
                  check_run_id: check.id,
                  status: 'completed',
                  conclusion: 'success',
                  completed_at: new Date().toISOString(),
                  output: {
                    title: 'Merge Gate: T3 AUTO-PASS',
                    summary: 'T3 tier — PM verdict not required. CI and executor result validation are separate required checks.'
                  }
                });
                return;
              }

              // ── 6. T2: GitHub PR review approval (no PM_VERDICT required) ──
              // Fallback: pm-verdict/v1 APPROVED from CODEOWNERS satisfies T2 for P0 lanes
              // where PM = executor and GitHub's self-approval restriction applies.
              if (tier === 'T2') {
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner, repo, pull_number: prNumber, per_page: 100
                });
                const approvals = reviews.filter(r => r.state === 'APPROVED');
                if (approvals.length === 0) {
                  // Check for pm-verdict/v1 APPROVED from an authorized CODEOWNERS member
                  const { data: comments } = await github.rest.issues.listComments({
                    owner, repo, issue_number: prNumber, per_page: 100
                  });
                  const hasPmVerdictApproval = comments.some(c => {
                    if (!c.user?.login || !AUTHORIZED_REVIEWERS.has(c.user.login) || c.user?.type === 'Bot') return false;
                    const body = (c.body || '').replace(/\\n/g, '\n');
                    const lines = body.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                    return lines[0] === 'PM_VERDICT: APPROVED' && lines[1] === 'schema: pm-verdict/v1';
                  });
                  if (!hasPmVerdictApproval) {
                    errors.push(
                      'T2 requires at least one GitHub PR review approval, or a pm-verdict/v1 APPROVED comment from a CODEOWNERS member. ' +
                      'Executor must run `gh pr review <number> --approve` after diff review ' +
                      '(or PM posts pm-verdict/v1 when self-approval is structurally blocked).'
                    );
                  }
                }
              }

              // ── 7. T1: PM verdict + t1-approved label ──────────────
              if (tier === 'T1') {
                const { data: comments } = await github.rest.issues.listComments({
                  owner, repo, issue_number: prNumber, per_page: 100
                });

                function parseVerdict(body) {
                  if (!body) return null;
                  const normalized = body.replace(/\\n/g, '\n');
                  const lines = normalized.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                  if (lines.length < 3) return null;
                  const verdictMatch = lines[0].replace(/^\$/, '').match(
                    /^PM_VERDICT:\s+(APPROVED|CHANGES_REQUIRED)$/i
                  );
                  if (!verdictMatch) return null;
                  if (lines[1] !== 'schema: pm-verdict/v1') return null;
                  const issueMatch = lines[2].match(
                    /^Issue:\s+((?:UTV2|UNI)-\d+)$/i
                  );
                  if (!issueMatch) return null;
                  return {
                    verdict: verdictMatch[1].toUpperCase(),
                    issueId: issueMatch[1],
                  };
                }

                const verdicts = comments
                  .map(c => ({
                    user: c.user?.login,
                    userType: c.user?.type,
                    parsed: parseVerdict(c.body),
                    createdAt: c.created_at,
                  }))
                  .filter(v => v.parsed !== null);

                if (verdicts.length === 0) {
                  errors.push(
                    'T1 requires a valid pm-verdict/v1 comment. PM must post a structured verdict.'
                  );
                } else {
                  const latest = verdicts[verdicts.length - 1];

                  if (latest.userType === 'Bot') {
                    errors.push(
                      `PM verdict from bot account "${latest.user}" is not authorized. Must be a human CODEOWNERS member.`
                    );
                  } else if (!AUTHORIZED_REVIEWERS.has(latest.user)) {
                    errors.push(
                      `PM verdict author "${latest.user}" is not in CODEOWNERS. Authorized: ${[...AUTHORIZED_REVIEWERS].join(', ')}.`
                    );
                  }

                  if (latest.parsed.verdict !== 'APPROVED') {
                    errors.push(
                      `Most recent PM verdict is "${latest.parsed.verdict}", not "APPROVED".`
                    );
                  }

                  // Bounce limit check
                  const changesRequested = verdicts.filter(
                    v => v.parsed.verdict === 'CHANGES_REQUIRED'
                  );
                  if (changesRequested.length >= 3) {
                    errors.push(
                      `Bounce limit exceeded (${changesRequested.length} CHANGES_REQUIRED verdicts). Issue should be moved to Failed for PM triage.`
                    );
                  }
                }

                if (!labels.includes('t1-approved')) {
                  errors.push(
                    'T1 requires "t1-approved" label on the PR. PM must apply this label after review.'
                  );
                }
              }

            } catch (e) {
              if (e.message !== 'Tier validation failed') {
                errors.push(`Internal error: ${e.message}`);
              }
            }

            // ── 10. Complete check run ─────────────────────────────────
            const passed = errors.length === 0;

            await github.rest.checks.update({
              owner, repo,
              check_run_id: check.id,
              status: 'completed',
              conclusion: passed ? 'success' : 'failure',
              completed_at: new Date().toISOString(),
              output: {
                title: passed
                  ? 'Merge Gate: APPROVED'
                  : 'Merge Gate: BLOCKED',
                summary: passed
                  ? 'All tier-appropriate merge requirements satisfied.'
                  : `**Merge blocked:**\n\n${errors.map(e => '- ' + e).join('\n')}`
              }
            });

            if (!passed) {
              // Post visible comment on failure (fail loud)
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: [
                  '**MERGE GATE: BLOCKED**',
                  '',
                  ...errors.map(e => '- ' + e),
                  '',
                  'Address the above before merge is authorized.'
                ].join('\n')
              });
              core.setFailed('Merge gate blocked.');
            }
