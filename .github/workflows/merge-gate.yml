# Merge Gate
#
# THE tier-aware policy engine for merge authorization on main.
# Branch protection defers review policy to this check — no universal
# PR review is required at the branch level.
#
# Reads tier from the lane manifest mirrored from Linear. GitHub tier labels
# remain required evidence, but automation applies/syncs them; labels are not
# authoritative. Verifies PM verdict is from an authorized CODEOWNERS member.
#
# T1: requires t1-approved label + PM_VERDICT: APPROVED from CODEOWNERS
# T2: pm-verdict/v1 APPROVED comment from CODEOWNERS is the canonical approval path
#   (ratified 2026-05-18, UTV2-979). GitHub PR review approval is also accepted.
#   Auto-merge via `gh pr merge --auto --squash` triggers once verdict + all checks pass.
# T3: passes automatically (CI + executor-result-validator are separate gates)
#
# governance:pause label on PR = hard block regardless of tier.
#
# Spec: docs/05_operations/GOVERNED_LOOP_SPEC.md (sections 2C, 3B, 4B)

name: Merge Gate

on:
  workflow_dispatch:
    inputs:
      pull_number:
        description: 'PR number to re-evaluate (for P0 lanes where self-approval is structurally blocked)'
        required: true
        type: number
  pull_request:
    # UTV2-1551: `opened` was missing here, so a brand-new PR got zero Merge
    # Gate evaluation from PR creation itself -- only from a later
    # push/label/review/comment event. That could leave a fresh T1/T2 PR
    # sitting `mergeStateStatus: BLOCKED` with the required "Merge Gate"
    # check never having run at all (not failed -- never executed), with no
    # visible signal of why. Adding `opened` makes Merge Gate run and report
    # a status immediately on PR creation. This does not approve anything
    # prematurely: the gate job's own logic already fails closed when no
    # tier label / lane manifest / PM verdict exists yet (see the "Tier
    # validation failed" and per-tier branches below), which is exactly the
    # BLOCKED status a truly fresh PR should show.
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  gate:
    # The required branch-protection identity is the custom check run managed
    # below. The native Actions job check must never share that name.
    name: Merge Gate Evaluator
    concurrency:
      group: merge-gate-${{ github.event.pull_request.number || github.event.issue.number || inputs.pull_number }}
      # Every event updates the same exact-head check. Queue evaluations so an
      # older run cannot be cancelled while that canonical check is in_progress.
      cancel-in-progress: false
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, 'PM_VERDICT:'))
    runs-on: ubuntu-latest
    steps:
      # UTV2-1543 (Codex P1): materialize the repo before requiring the T1
      # verdict helper below -- without this, `require('./scripts/ops/
      # merge-gate-verdict.cjs')` throws before the check run is even
      # created, failing Merge Gate for every PR/comment/dispatch
      # evaluation, not just enforcing the new freshness rule.
      #
      # Same privilege-boundary reasoning as UTV2-1550's Executor Result
      # Validator fix: this job holds checks/pull-requests/issues: write, and
      # actions/checkout defaults to the PR's own head/merge ref on
      # pull_request(_review) events -- attacker-controlled. Pin the ref to
      # the PR's base SHA (immutable, reachable from main, never PR-supplied)
      # for those event types so a PR can never modify merge-gate-verdict.cjs
      # to defeat its own T1 freshness check. issue_comment/workflow_dispatch
      # keep the default github.sha, which already resolves to the base
      # repo's default-branch HEAD for those trigger types.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_review') && github.event.pull_request.base.sha || github.sha }}

      # UTV2-1554 landed the final scripts/ops/merge-gate-verdict.cjs on main
      # ahead of this lane specifically so this job never needs to fetch or
      # execute PR-head content to bootstrap it. base.sha always has the
      # trusted copy; there is no first-introduction case to special-case
      # here anymore. See scripts/ops/workflow-hardening.test.ts for the
      # regression assertion that this job never fetches or executes
      # anything keyed on pull_request.head.sha.
      - name: Evaluate merge gate
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Authorized PM reviewers — must match .github/CODEOWNERS
            const AUTHORIZED_REVIEWERS = new Set(['griff843']);

            // UTV2-1543: T1 pm-verdict/v1 parsing + PR/head-SHA freshness
            // validation lives in a tested pure module, not duplicated here.
            const { parseVerdict, validateT1Verdicts } = require('./scripts/ops/merge-gate-verdict.cjs');

            // ── 1. Resolve PR ──────────────────────────────────────────
            let prNumber, headSha, headRef, baseSha, prTitle;
            if (context.eventName === 'pull_request' ||
                context.eventName === 'pull_request_review') {
              const pr = context.payload.pull_request;
              prNumber = pr.number;
              headSha = pr.head.sha;
              headRef = pr.head.ref;
              baseSha = pr.base.sha;
              prTitle = pr.title || '';
            } else if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt(context.payload.inputs.pull_number, 10);
              const { data: pr } = await github.rest.pulls.get({
                owner, repo, pull_number: prNumber
              });
              headSha = pr.head.sha;
              headRef = pr.head.ref;
              baseSha = pr.base.sha;
              prTitle = pr.title || '';
            } else {
              prNumber = context.payload.issue.number;
              const { data: pr } = await github.rest.pulls.get({
                owner, repo, pull_number: prNumber
              });
              headSha = pr.head.sha;
              headRef = pr.head.ref;
              baseSha = pr.base.sha;
              prTitle = pr.title || '';
            }

            // ── 2. Upsert the canonical exact-head check run ───────────
            // Identity is repository + PR + exact head SHA. PR serialization
            // above makes this read/create sequence race-free across events.
            const existingChecks = await github.paginate(
              github.rest.checks.listForRef,
              {
                owner, repo,
                ref: headSha,
                check_name: 'Merge Gate',
                filter: 'all',
                per_page: 100,
              }
            );
            const canonicalExternalId = `merge-gate:${prNumber}:${headSha}`;
            const matchingChecks = existingChecks
              .filter(run =>
                run.name === 'Merge Gate' &&
                run.head_sha === headSha &&
                run.app?.slug === 'github-actions' &&
                run.external_id === canonicalExternalId
              )
              .sort((a, b) => b.id - a.id);

            let check = matchingChecks[0];
            if (!check) {
              const created = await github.rest.checks.create({
                owner, repo,
                name: 'Merge Gate',
                head_sha: headSha,
                external_id: canonicalExternalId,
                status: 'in_progress',
                started_at: new Date().toISOString()
              });
              check = created.data;
            } else {
              await github.rest.checks.update({
                owner, repo,
                check_run_id: check.id,
                status: 'in_progress',
                started_at: new Date().toISOString(),
                output: {
                  title: 'Merge Gate: EVALUATING',
                  summary: `Re-evaluating merge policy for PR #${prNumber} at ${headSha}.`
                }
              });
            }

            // One-time repair for heads polluted by the former create-on-every-
            // event behavior. Superseded failures become neutral so only the
            // newest exact-head check can govern branch protection.
            for (const duplicate of matchingChecks.slice(1)) {
              await github.rest.checks.update({
                owner, repo,
                check_run_id: duplicate.id,
                status: 'completed',
                conclusion: 'neutral',
                completed_at: new Date().toISOString(),
                output: {
                  title: 'Merge Gate: SUPERSEDED',
                  summary: `Superseded by canonical Merge Gate check run ${check.id} for PR #${prNumber} at ${headSha}.`
                }
              });
            }

            const errors = [];
            let evaluatorError = null;

            try {
              // ── 3. Get PR labels ───────────────────────────────────
              const { data: issue } = await github.rest.issues.get({
                owner, repo, issue_number: prNumber
              });
              const labels = (issue.labels || []).map(l =>
                typeof l === 'string' ? l : l.name
              ).filter(Boolean);

              // ── 4. Resolve authoritative tier from lane manifest ───
              const issueMatch = (headRef || '').match(/(?:^|\/)((?:utv2|uni)-\d+)/i) ||
                (prTitle || '').match(/((?:UTV2|UNI)-\d+)/i);
              const issueId = issueMatch ? issueMatch[1].toUpperCase() : null;

              async function readManifest(ref) {
                if (!issueId || !ref) return null;
                try {
                  const { data } = await github.rest.repos.getContent({
                    owner, repo,
                    path: `docs/06_status/lanes/${issueId}.json`,
                    ref,
                  });
                  if (Array.isArray(data) || !data.content) return null;
                  return JSON.parse(Buffer.from(data.content, data.encoding || 'base64').toString('utf8'));
                } catch (error) {
                  if (error.status === 404) return null;
                  throw error;
                }
              }

              if (!issueId) {
                errors.push('No issue ID found in PR branch or title. Cannot resolve authoritative tier.');
              }

              const manifest = await readManifest(headSha) || await readManifest(baseSha);
              const authoritativeTier = manifest && /^(T1|T2|T3)$/.test(String(manifest.tier))
                ? String(manifest.tier).toUpperCase()
                : null;

              if (!authoritativeTier) {
                errors.push(
                  `No authoritative lane manifest tier found${issueId ? ` for ${issueId}` : ''}. ` +
                  'GitHub tier labels are evidence only and cannot authorize merge by themselves.'
                );
              } else if (manifest.issue_id && String(manifest.issue_id).toUpperCase() !== issueId) {
                errors.push(`Lane manifest issue_id ${manifest.issue_id} does not match PR issue ${issueId}.`);
              }

              // ── 5. Verify GitHub tier evidence mirrors manifest ─────
              const tierLabels = labels.filter(l =>
                /^tier:T[123]$/i.test(l)
              ).map(l => {
                const match = l.match(/^tier:(T[123])$/i);
                return `tier:${match[1].toUpperCase()}`;
              });
              const uniqueTierLabels = [...new Set(tierLabels)];
              const expectedTierLabel = authoritativeTier ? `tier:${authoritativeTier}` : null;

              if (expectedTierLabel && uniqueTierLabels.length === 0) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNumber, labels: [expectedTierLabel]
                });
                labels.push(expectedTierLabel);
                uniqueTierLabels.push(expectedTierLabel);
              }

              if (expectedTierLabel && uniqueTierLabels.length > 0 && !uniqueTierLabels.includes(expectedTierLabel)) {
                errors.push(
                  `Tier drift: authoritative ${expectedTierLabel}, PR has ${uniqueTierLabels.join(', ')}. ` +
                  'Automation will mirror the authoritative tier; stale/manual labels cannot authorize merge.'
                );
              }

              if (expectedTierLabel && uniqueTierLabels.length > 1) {
                errors.push(
                  `Multiple tier labels found: ${uniqueTierLabels.join(', ')}. Must mirror exactly ${expectedTierLabel}.`
                );
              }

              // ── 4b. Kill switch ──────────────────────────────────
              if (labels.includes('governance:pause')) {
                errors.push(
                  'governance:pause label is active. All merges blocked until removed by PM.'
                );
              }

              if (errors.length === 0) {
                const tier = authoritativeTier;

                // ── 5. T3: auto-pass ──────────────────────────────────
                // T3 has no tier-specific policy errors. CI and executor
                // result validation remain separate required checks.

                // ── 6. T2: pm-verdict/v1 is the canonical approval path (UTV2-979, 2026-05-18) ──
                // GitHub PR review approval is also accepted. Either satisfies the gate.
                //
                // A third path (UTV2-1523) recognizes a valid EXECUTOR_RESULT/v1 comment from an
                // AUTHORIZED_REVIEWERS member as sufficient self-attestation. This exists because
                // GitHub blocks `gh pr review --approve` when the reviewing account is also the PR
                // author -- true for every executor in this repo, since Claude and Codex both open
                // PRs under the same griff843 identity. CLAUDE.md already documents self-approval as
                // intended to satisfy T2 with no PM presence required; this makes that mechanically
                // possible instead of requiring an --admin merge for every T2 PR.
                if (tier === 'T2') {
                  const { data: reviews } = await github.rest.pulls.listReviews({
                    owner, repo, pull_number: prNumber, per_page: 100
                  });
                  const approvals = reviews.filter(r => r.state === 'APPROVED');
                  if (approvals.length === 0) {
                    const { data: comments } = await github.rest.issues.listComments({
                      owner, repo, issue_number: prNumber, per_page: 100
                    });
                    // Check for pm-verdict/v1 APPROVED from an authorized CODEOWNERS member
                    const hasPmVerdictApproval = comments.some(c => {
                      if (!c.user?.login || !AUTHORIZED_REVIEWERS.has(c.user.login) || c.user?.type === 'Bot') return false;
                      const body = (c.body || '').replace(/\\n/g, '\n');
                      const lines = body.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                      return lines[0] === 'PM_VERDICT: APPROVED' && lines[1] === 'schema: pm-verdict/v1';
                    });
                    // Check for a valid executor-result/v1 self-attestation from an authorized member
                    const hasExecutorResultAttestation = comments.some(c => {
                      if (!c.user?.login || !AUTHORIZED_REVIEWERS.has(c.user.login) || c.user?.type === 'Bot') return false;
                      const body = (c.body || '').replace(/\\n/g, '\n');
                      const lines = body.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                      return lines[0] === 'EXECUTOR_RESULT: READY_FOR_REVIEW' && lines[1] === 'schema: executor-result/v1';
                    });
                    if (!hasPmVerdictApproval && !hasExecutorResultAttestation) {
                      errors.push(
                        'T2 requires a pm-verdict/v1 APPROVED comment from a CODEOWNERS member, ' +
                        'a GitHub PR review approval, or an executor-result/v1 self-attestation comment ' +
                        'from a CODEOWNERS member.'
                      );
                    }
                  }
                }

                // ── 7. T1: PM verdict + t1-approved label ────────────
                if (tier === 'T1') {
                  const { data: comments } = await github.rest.issues.listComments({
                    owner, repo, issue_number: prNumber, per_page: 100
                  });

                  const verdicts = comments
                    .map(c => ({
                      user: c.user?.login,
                      userType: c.user?.type,
                      parsed: parseVerdict(c.body),
                      createdAt: c.created_at,
                    }))
                    .filter(v => v.parsed !== null);

                  // UTV2-1543: also requires PR: and Head SHA: to match this
                  // exact PR/head, fail-closed on stale/mismatched verdicts —
                  // see scripts/ops/merge-gate-verdict.cjs and its test suite.
                  errors.push(...validateT1Verdicts(verdicts, {
                    prNumber,
                    headSha,
                    authorizedReviewers: AUTHORIZED_REVIEWERS,
                  }));

                  if (!labels.includes('t1-approved')) {
                    errors.push(
                      'T1 requires "t1-approved" label on the PR. PM must apply this label after review.'
                    );
                  }
                }
              }

            } catch (e) {
              evaluatorError = e;
              errors.push(`Internal error: ${e.message}`);
            }

            // ── 10. Complete check run ─────────────────────────────────
            const passed = errors.length === 0;

            await github.rest.checks.update({
              owner, repo,
              check_run_id: check.id,
              status: 'completed',
              conclusion: passed ? 'success' : 'failure',
              completed_at: new Date().toISOString(),
              output: {
                title: passed
                  ? 'Merge Gate: APPROVED'
                  : 'Merge Gate: BLOCKED',
                summary: passed
                  ? 'All tier-appropriate merge requirements satisfied.'
                  : `**Merge blocked:**\n\n${errors.map(e => '- ' + e).join('\n')}`
              }
            });

            if (!passed) {
              // Post visible comment on failure (fail loud)
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: [
                  '**MERGE GATE: BLOCKED**',
                  '',
                  ...errors.map(e => '- ' + e),
                  '',
                  'Address the above before merge is authorized.'
                ].join('\n')
              });
            }

            // Policy denial is the expected fail-closed outcome and is fully
            // represented by the custom check. Only evaluator malfunction
            // fails this non-required Actions job.
            if (evaluatorError) {
              throw evaluatorError;
            }

  # ── WFR-v2 Validators ──────────────────────────────────────────────────────
  # Workflow Runtime v2 Phase D: consume proof-check, tier-sync, review state.
  # Runs in parallel with the gate job. Fails closed on stale/missing/invalid
  # state. This is advisory for T3 but blocking for T1/T2.
  wfr-validators:
    name: WFR-v2 Validators
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract issue ID from branch
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          # Extract UTV2-#### from branch name
          ISSUE_ID=$(echo "$BRANCH" | grep -oP 'UTV2-\d+' | head -1 || echo "")
          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Run tier-sync validator
        if: steps.branch.outputs.issue_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_ID="${{ steps.branch.outputs.issue_id }}"
          PR="${{ steps.branch.outputs.pr_number }}"
          echo "Running ops:tier-sync $ISSUE_ID --pr $PR --sync"
          pnpm ops:tier-sync "$ISSUE_ID" --pr "$PR" --sync

      - name: Run proof-check validator
        if: steps.branch.outputs.issue_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_ID="${{ steps.branch.outputs.issue_id }}"
          PR="${{ steps.branch.outputs.pr_number }}"
          echo "Running ops:proof-check $ISSUE_ID --pr $PR"
          # proof-check is advisory in CI (proof may not exist on branch yet)
          pnpm ops:proof-check "$ISSUE_ID" --pr "$PR" || {
            echo "::warning::proof-check FAIL for $ISSUE_ID PR #$PR (proof may not yet exist on this branch)"
          }

      - name: Check review state (WFR-v2 Phase C)
        if: steps.branch.outputs.issue_id != ''
        run: |
          ISSUE_ID="${{ steps.branch.outputs.issue_id }}"
          REVIEW_PATH=".ops/reviews/${ISSUE_ID}.json"
          if [ -f "$REVIEW_PATH" ]; then
            echo "Review state found: $REVIEW_PATH"
            # Validate schema version
            VERSION=$(jq -r '.schema_version // "missing"' "$REVIEW_PATH")
            if [ "$VERSION" != "1" ]; then
              echo "::error::Review state schema_version must be 1, got: $VERSION"
              exit 1
            fi
            # Check for self-certification
            EXECUTOR=$(jq -r '.executor // ""' "$REVIEW_PATH")
            REVIEWER=$(jq -r '.reviewer // ""' "$REVIEW_PATH")
            if [ -n "$EXECUTOR" ] && [ -n "$REVIEWER" ] && [ "$EXECUTOR" = "$REVIEWER" ]; then
              echo "::error::Self-certification detected: executor=$EXECUTOR == reviewer=$REVIEWER"
              exit 1
            fi
            echo "Review state valid: executor=$EXECUTOR reviewer=$REVIEWER"
          else
            echo "::notice::No review state at $REVIEW_PATH — expected after ops:review runs"
          fi
