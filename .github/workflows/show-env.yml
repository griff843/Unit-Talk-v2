name: Show env and fix autorun

on:
  workflow_dispatch:

env:
  DEPLOY_HOST: ${{ secrets.UNIT_TALK_DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.UNIT_TALK_DEPLOY_USER }}

jobs:
  check-env:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Show ingestor-relevant env vars
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash << 'SSHEOF'
          echo "=== ingestor env vars in .env.production ==="
          grep -E 'UNIT_TALK_INGESTOR|UNIT_TALK_API_URL|SUPABASE_URL|NODE_ENV|APP_ENV' /opt/unit-talk/.env.production | sed 's/=.*/=<set>/' || true
          echo ""
          echo "=== checking AUTORUN specifically ==="
          grep 'UNIT_TALK_INGESTOR_AUTORUN' /opt/unit-talk/.env.production || echo "NOT FOUND"
          echo ""
          echo "=== checking MAX_CYCLES ==="
          grep 'UNIT_TALK_INGESTOR_MAX_CYCLES' /opt/unit-talk/.env.production || echo "NOT FOUND"
          SSHEOF