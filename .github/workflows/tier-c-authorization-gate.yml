name: Tier C Authorization Gate

# Closes the "Tier C path guard silently authorizes via self-declared scope"
# loophole (UTV2-1570, implementation child of UTV2-1451).
#
# .claude/hooks/tier-c-path-guard.sh is a local, real-time PreToolUse editing
# guard -- a session can route around it entirely (disable hooks, edit
# outside Claude Code). It is not a merge gate. This workflow is the
# mechanical, CI-enforced half: it fails closed when a non-T1 PR's diff
# touches a canonical Tier C path (scripts/ops/merge-risk.ts's isTierCPath(),
# imported directly -- not a second Tier C path list) without a valid
# tier-c-approval/v1 PR comment (docs/05_operations/schemas/tier-c-approval-v1.md)
# covering every matched path, from an authorized CODEOWNERS human, bound to
# the exact PR head SHA.
#
# T1 lanes touching Tier C paths need no additional artifact here: their own
# t1-approved + pm-verdict/v1 gate (merge-gate.yml) already is PM sign-off on
# the exact head, which necessarily covers whatever the diff touches.
#
# Required-check status: candidate for promotion to `main` branch protection
# (see docs/05_operations/REQUIRED_CI_CHECKS.md §5) -- promote after the
# first full green run is confirmed on a Tier-C-touching PR, same rollout
# pattern used for Proof Auditor Gate.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  gate:
    name: Tier C Authorization Gate
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, 'TIER_C_APPROVAL:'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: resolve_pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'pull_request'
              ? context.payload.pull_request.number
              : context.payload.issue.number;
            core.setOutput('pr_number', prNumber);

      # PM/Codex review (PR #1293, P1): this job holds checks:write/
      # issues:write/pull-requests:write. actions/checkout defaults to the
      # PR's own head/merge ref on pull_request events -- attacker-
      # controlled -- and pnpm install below runs project/dependency
      # lifecycle scripts (postinstall etc.). A malicious PR could modify
      # package.json/pnpm-lock.yaml to run arbitrary code with this job's
      # write-scoped token during install. Pin checkout to the PR's base
      # SHA (immutable, reachable from main, never PR-supplied) for
      # pull_request/pull_request_review-shaped events so install always
      # resolves from trusted, non-PR-controlled dependency state -- same
      # reasoning and pattern as merge-gate.yml's own checkout-ref pin
      # (Codex P1 finding on that lane) and executor-result-validator.yml's.
      # issue_comment/workflow_dispatch keep the default github.sha, which
      # already resolves to the base repo's default-branch HEAD for those
      # trigger types.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Installs from the trusted base-branch package.json/pnpm-lock.yaml
      # (see Checkout step above) -- never the PR's own, potentially
      # PR-modified dependency manifest.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve PR metadata, create pending check, tier, changed files, and approval comments
        id: collect
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number(${{ steps.resolve_pr.outputs.pr_number }});

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const headSha = pr.head.sha;
            const headRef = pr.head.ref;
            const baseSha = pr.base.sha;
            const prTitle = pr.title || '';

            // ── Create an explicit check run bound to the PR's head SHA
            // (Codex review, PR #1293): an issue_comment-triggered
            // evaluation (posting a TIER_C_APPROVAL comment after an
            // earlier pull_request-triggered failure) does NOT create or
            // update any Checks API run by default -- it only produces the
            // workflow's own native per-job status for whatever ref
            // triggered *this* run, which is never the PR's head_sha for an
            // issue_comment event. Branch protection would keep showing the
            // earlier failed pull_request run against that head SHA
            // forever, so a later valid approval comment would never
            // actually unblock the PR without a manual rerun or new push.
            // Mirrors merge-gate.yml's own checks.create/checks.update
            // pattern exactly, bound explicitly to headSha regardless of
            // which event triggered this run.
            const { data: check } = await github.rest.checks.create({
              owner, repo,
              name: 'Tier C Authorization Gate',
              head_sha: headSha,
              status: 'in_progress',
              started_at: new Date().toISOString(),
            });
            core.setOutput('check_run_id', check.id);

            // PM/Codex review (PR #1293, P2): everything below this point can
            // throw (a malformed lane manifest, a transient API failure while
            // listing files/comments, etc.). Without a try/catch, an error
            // here would abort the step *after* the check above was already
            // created, leaving it stuck `in_progress` on the PR head forever
            // -- indistinguishable from "still running" to branch protection.
            // Complete the check as a failure on any such error before
            // rethrowing, so it always reaches a terminal state.
            try {
              // ── Resolve authoritative tier from lane manifest, same source
              // merge-gate.yml treats as authoritative -- GitHub tier labels are
              // evidence, never authority (docs/05_operations/EXECUTION_TRUTH_MODEL.md).
              const issueMatch = (headRef || '').match(/(?:^|\/)((?:utv2|uni)-\d+)/i) ||
                (prTitle || '').match(/((?:UTV2|UNI)-\d+)/i);
              const issueId = issueMatch ? issueMatch[1].toUpperCase() : null;

              async function readManifest(ref) {
                if (!issueId || !ref) return null;
                try {
                  const { data } = await github.rest.repos.getContent({
                    owner, repo,
                    path: `docs/06_status/lanes/${issueId}.json`,
                    ref,
                  });
                  if (Array.isArray(data) || !data.content) return null;
                  return JSON.parse(Buffer.from(data.content, data.encoding || 'base64').toString('utf8'));
                } catch (error) {
                  if (error.status === 404) return null;
                  throw error;
                }
              }

              const manifest = await readManifest(headSha) || await readManifest(baseSha);
              const tier = manifest && /^(T1|T2|T3)$/i.test(String(manifest.tier))
                ? String(manifest.tier).toUpperCase()
                : 'T3'; // fail-closed default: an unresolvable tier is treated as
                         // the most-scrutinized non-T1 case, never silently exempted.

              // ── Changed files via the API (never a local `git diff` against
              // a PR-controlled checkout -- same reasoning as
              // file-scope-lock-check.yml's own "Collect changed files" step).
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner, repo, pull_number: prNumber, per_page: 100
              });
              fs.mkdirSync('.out', { recursive: true });
              fs.writeFileSync('.out/tier-c-changed-files.txt', files.map((f) => f.filename).join('\n') + '\n', 'utf8');

              // ── Collect authorized tier-c-approval/v1 comments. Mirrors
              // scripts/ci/tier-c-approval-comment-parser.ts inline (GitHub
              // Actions' github-script body cannot import a TS module
              // directly) -- keep the two in lockstep on any future change.
              const AUTHORIZED_REVIEWERS = new Set(['griff843']);

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: prNumber, per_page: 100
              });

              const approvals = [];
              for (const c of comments) {
                if (!c.user?.login || !AUTHORIZED_REVIEWERS.has(c.user.login) || c.user?.type === 'Bot') continue;

                const body = (c.body || '').replace(/\r\n/g, '\n');
                const lines = body.split(/\r?\n/).map((l) => l.trim());
                if (lines[0] !== 'TIER_C_APPROVAL: APPROVED' || lines[1] !== 'schema: tier-c-approval/v1') continue;

                const fields = {};
                const paths = [];
                let i = 2;
                while (i < lines.length) {
                  const line = lines[i];
                  if (line === 'Paths:') {
                    i += 1;
                    while (i < lines.length && lines[i].startsWith('- ')) {
                      const p = lines[i].slice(2).trim();
                      if (p) paths.push(p);
                      i += 1;
                    }
                    continue;
                  }
                  const match = line.match(/^([A-Za-z-]+):\s*(.+)$/);
                  if (match) fields[match[1]] = match[2].trim();
                  i += 1;
                }

                const issueFieldMatch = (fields['Issue'] || '').match(/^UTV2-\d+$/);
                const prFieldMatch = (fields['PR'] || '').match(/^#(\d+)$/);
                if (!issueFieldMatch || !prFieldMatch || !fields['Head-SHA'] || paths.length === 0) continue;

                approvals.push({
                  issue_id: issueFieldMatch[0],
                  pr_number: Number.parseInt(prFieldMatch[1], 10),
                  head_sha: fields['Head-SHA'],
                  paths,
                  authorized_by: c.user.login,
                  reason: fields['Reason'] || '',
                });
              }

              fs.writeFileSync('.out/tier-c-approvals.json', JSON.stringify(approvals, null, 2), 'utf8');
              fs.writeFileSync('.out/tier-c-meta.json', JSON.stringify({ tier, prNumber, headSha, issueId }, null, 2), 'utf8');
            } catch (error) {
              await github.rest.checks.update({
                owner, repo,
                check_run_id: check.id,
                status: 'completed',
                conclusion: 'failure',
                completed_at: new Date().toISOString(),
                output: {
                  title: 'Tier C Authorization Gate: INFRA ERROR',
                  summary: `Failed to collect PR metadata/tier/changed files/approvals: ${error instanceof Error ? error.message : String(error)}`,
                },
              });
              throw error;
            }

      - name: Resolve trusted gate script and its dependency graph
        id: resolve_trusted
        env:
          GH_TOKEN: ${{ github.token }}
        # The PR under evaluation cannot be trusted to supply the code that
        # evaluates it -- a diff could touch a Tier C path *and* modify this
        # gate script (or scripts/ops/merge-risk.ts's own Tier C path
        # matrix) in the same commit set to make the check pass. Resolve
        # every file in the gate's own import graph (tier-c-authorization-
        # gate.ts -> tier-c-approval-comment-parser.ts, and -> merge-risk.ts
        # -> shared.ts + concurrency-config.ts) from origin/main and execute
        # that mirror instead of the PR's own copies. shared.ts requires a
        # real git repository at runtime (getRepoRoot()), so the mirror is
        # placed under .out/ inside THIS checkout (a genuine repo), not an
        # isolated temp directory -- verified empirically this session that
        # relocating shared.ts outside any git repo throws immediately at
        # import time.
        #
        # Bootstrap exception: origin/main has no copy yet of the two files
        # this very PR introduces (tier-c-authorization-gate.ts,
        # tier-c-approval-comment-parser.ts). Fall back to fetching their
        # *text content* (never executed as-is; only read as bytes) from the
        # PR head SHA via the GitHub Contents API -- never from the local
        # working tree, which is now pinned to the base SHA (see Checkout
        # step) and so no longer contains the PR's own files at all. Reading
        # file bytes via the API carries none of the pnpm-install/execution
        # risk the checkout-ref pin closes; only running that content would.
        # Expected only until this PR merges, same rollout pattern
        # file-scope-lock-check.yml used for file-scope-guard.ts under
        # UTV2-1521.
        run: |
          mkdir -p .out/trusted-checkout/scripts/ci .out/trusted-checkout/scripts/ops
          HEAD_SHA=$(python3 -c "import json; print(json.load(open('.out/tier-c-meta.json'))['headSha'])")

          for f in scripts/ops/merge-risk.ts scripts/ops/shared.ts scripts/ops/concurrency-config.ts; do
            if git show "origin/main:$f" > ".out/trusted-checkout/$f" 2>/dev/null; then
              echo "Using base-branch (origin/main) copy of $f"
            else
              echo "::error::Base branch has no $f -- this file is expected to already exist on main. Failing closed."
              exit 1
            fi
          done

          for f in scripts/ci/tier-c-authorization-gate.ts scripts/ci/tier-c-approval-comment-parser.ts; do
            if git show "origin/main:$f" > ".out/trusted-checkout/$f" 2>/dev/null; then
              echo "Using base-branch (origin/main) copy of $f"
            else
              echo "::warning::Base branch has no $f yet -- fetching its text content from the PR head SHA via the Contents API (never executed from the local working tree). Expected only for the PR that introduces this gate (UTV2-1570)."
              gh api "repos/${{ github.repository }}/contents/$f?ref=$HEAD_SHA" --jq '.content' \
                | base64 -d > ".out/trusted-checkout/$f"
            fi
          done

      - name: Evaluate Tier C authorization
        id: gate
        # continue-on-error: the job's own native check is not what branch
        # protection keys off (see "Create pending check" above) -- the
        # explicit checks.update below is. Letting this step fail the job
        # outright would skip that completion step and leave the explicit
        # check stuck "in_progress" forever. The follow-up step still marks
        # the job failed via core.setFailed() when the verdict is FAIL, so
        # Actions-tab visibility is unaffected.
        continue-on-error: true
        run: |
          TIER=$(python3 -c "import json; print(json.load(open('.out/tier-c-meta.json'))['tier'])")
          PR_NUMBER=$(python3 -c "import json; print(json.load(open('.out/tier-c-meta.json'))['prNumber'])")
          HEAD_SHA=$(python3 -c "import json; print(json.load(open('.out/tier-c-meta.json'))['headSha'])")
          pnpm exec tsx .out/trusted-checkout/scripts/ci/tier-c-authorization-gate.ts \
            --changed-files-file .out/tier-c-changed-files.txt \
            --tier "$TIER" \
            --approval-file .out/tier-c-approvals.json \
            --pr-number "$PR_NUMBER" \
            --head-sha "$HEAD_SHA" \
            --output-json .out/tier-c-result.json

      - name: Complete check run and comment on failure
        if: always() && steps.collect.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = Number(${{ steps.resolve_pr.outputs.pr_number }});
            const checkRunId = Number(${{ steps.collect.outputs.check_run_id }});

            let result = null;
            try {
              result = JSON.parse(fs.readFileSync('.out/tier-c-result.json', 'utf8'));
            } catch {
              result = null;
            }

            // No result file at all means the gate script itself crashed
            // before writing output (infra error, not an authorization
            // finding) -- fail closed rather than silently passing.
            const passed = result ? result.verdict === 'PASS' : false;

            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: checkRunId,
              status: 'completed',
              conclusion: passed ? 'success' : 'failure',
              completed_at: new Date().toISOString(),
              output: {
                title: passed
                  ? 'Tier C Authorization Gate: PASS'
                  : 'Tier C Authorization Gate: BLOCKED',
                summary: result
                  ? `${result.reason}\n\nTier: ${result.tier}\nMatched Tier C paths: ${result.matched_tier_c_paths.join(', ') || '(none)'}`
                  : 'Gate script did not produce a result (infra error) -- failing closed.',
              },
            });

            if (!passed) {
              const lines = ['**TIER C AUTHORIZATION REQUIRED**', ''];
              if (result) {
                lines.push(`Lane tier: \`${result.tier}\``, '');
                lines.push('This PR touches Tier C path(s) with no valid `tier-c-approval/v1` comment covering them:', '');
                for (const p of result.uncovered_paths) {
                  lines.push(`- \`${p}\``);
                }
                lines.push('');
              }
              lines.push(
                'Post a comment matching `docs/05_operations/schemas/tier-c-approval-v1.md` ' +
                '(schema: tier-c-approval/v1), authored by an authorized CODEOWNERS human, ' +
                'bound to this exact PR and head SHA, covering every path listed above. ' +
                'T1 lanes are exempt from this gate -- their own `t1-approved` + `pm-verdict/v1` ' +
                'already covers this diff. Once a valid approval comment is posted, this check ' +
                're-evaluates automatically and updates in place -- no new push required.'
              );

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: lines.join('\n'),
              });

              core.setFailed('Tier C authorization gate: BLOCKED');
            }
