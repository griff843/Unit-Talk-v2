name: Direct Main Push Guard

# Detection-only guard (UTV2-1537): runs after a commit lands on `main` and
# classifies it using scripts/ci/direct-main-push-guard.ts. This CANNOT prevent a
# direct push (branch protection is the only prevention mechanism, and it structurally
# does not apply to a repo admin when `enforce_admins` is disabled -- see
# docs/06_status/INCIDENTS/INC-2026-07-14-utv2-1533-direct-main-push.md for the
# verified facts on that boundary). What this workflow adds is a durable, mechanical,
# after-the-fact record instead of relying on a manual audit to notice.
#
# A red run here does not mean CI "failed" in the usual sense -- the commit is already
# on main by the time this runs. It means: go read
# docs/05_operations/DIRECT_MAIN_BYPASS_POLICY.md and either open a
# docs/06_status/INCIDENTS/ entry, or add an Emergency-Bypass-Record trailer pointing
# at one that already exists and genuinely pre-authorized this push.

on:
  push:
    branches:
      - main

permissions:
  contents: read
  # Required for gatherCommitInput()'s `commits/{sha}/pulls` call -- GitHub's REST
  # docs list "Pull requests: read" as the required scope for that endpoint. Without
  # it the call 403s, the catch path silently empties associatedPrNumbers, and every
  # ordinary human-authored PR merge is misclassified as unauthorized_direct_push
  # (Codex review finding, this lane's own PR).
  pull-requests: read

concurrency:
  group: direct-main-push-guard-${{ github.sha }}
  cancel-in-progress: false

jobs:
  guard:
    name: Classify head commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: the before..after push range can span an arbitrary number
          # of commits, and git merge-base --is-ancestor / --since.. need it reachable.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Classify every commit in this push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          # A push can advance main by more than one commit; classifying only the
          # head SHA would miss an unauthorized commit earlier in the same push
          # (Codex review finding, this lane's own PR). Use the push's before..after
          # range when `before` is a real ancestor SHA; a zero SHA (new-branch-style
          # push, not expected for an existing branch like main, but guarded anyway)
          # or a before-SHA that isn't actually an ancestor (a force-push or a
          # history rewrite) falls back to classifying only the head commit rather
          # than feeding the classifier a nonsensical or unbounded range.
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] \
              && git merge-base --is-ancestor "$BEFORE_SHA" "$AFTER_SHA" 2>/dev/null; then
            npx tsx scripts/ci/direct-main-push-guard.ts --since "$BEFORE_SHA" --until "$AFTER_SHA" --json \
              | tee /tmp/direct-main-push-guard.json
          else
            echo "::notice title=direct-main-push-guard::before-SHA unavailable or not an ancestor of after-SHA; classifying only the head commit."
            npx tsx scripts/ci/direct-main-push-guard.ts --sha "$AFTER_SHA" --json | tee /tmp/direct-main-push-guard.json
          fi

          unauthorized=0
          while IFS=$'\t' read -r sha code reason; do
            echo "::notice title=direct-main-push-guard::${sha} classified as ${code}: ${reason}"
            if [ "$code" = "unauthorized_direct_push" ]; then
              unauthorized=1
            fi
          done < <(jq -r '.results[] | [.sha, .code, .reason] | @tsv' /tmp/direct-main-push-guard.json)

          if [ "$unauthorized" = "1" ]; then
            echo "::warning title=direct-main-push-guard::Unauthorized direct push(es) detected on main in this push (before=${BEFORE_SHA}, after=${AFTER_SHA}). See docs/05_operations/DIRECT_MAIN_BYPASS_POLICY.md and docs/06_status/INCIDENTS/."
            exit 1
          fi
