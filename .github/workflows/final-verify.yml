name: Final service verification

on:
  workflow_dispatch:

env:
  DEPLOY_HOST: ${{ secrets.UNIT_TALK_DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.UNIT_TALK_DEPLOY_USER }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Full service state
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash << 'SSHEOF'
          echo "=== docker ps ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.RestartCount}}" | grep unit-talk || docker ps --format "table {{.Names}}\t{{.Status}}" | grep unit-talk

          echo ""
          echo "=== ingestor logs (last 60, with timestamps) ==="
          docker logs --tail=60 --timestamps unit-talk-ingestor-1 2>&1

          echo ""
          echo "=== worker logs (last 10) ==="
          docker logs --tail=10 unit-talk-worker-1 2>&1

          echo ""
          echo "=== api health (full) ==="
          curl -sf http://localhost:4000/health
          SSHEOF