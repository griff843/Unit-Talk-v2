name: Runtime Verifier Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # Proof paths — direct evidence changes always trigger the gate
      - 'docs/06_status/proof/**'
      # Lane closeout paths — manifest and ops-script changes can affect gate validity
      - 'docs/06_status/lanes/**'
      - 'scripts/ops/**'
      # R-level artifact output paths
      - 'artifacts/**'
      # Runtime-sensitive paths (R-level classified per r1-r5-rules.json)
      # lifecycle-fsm (R1–R4)
      - 'apps/api/src/submission-service.ts'
      - 'apps/api/src/candidate-pick-scanner.ts'
      - 'packages/domain/src/lifecycle/**'
      - 'apps/worker/**'
      # promotion-scoring (R1–R3)
      - 'packages/domain/src/promotion/**'
      - 'apps/api/src/promotion-service.ts'
      # settlement-grading (R1–R4)
      - 'apps/api/src/settlement-service.ts'
      - 'packages/domain/src/grading/**'
      - 'packages/domain/src/clv/**'
      # strategy-bankroll (R5)
      - 'packages/domain/src/strategy/**'
      # ingestor-provider (R1)
      - 'apps/ingestor/**'
      # DB runtime repositories (proof-coverage-guard sensitive paths)
      - 'packages/db/src/lifecycle.ts'
      - 'packages/db/src/repositories.ts'
      - 'packages/db/src/runtime-repositories.ts'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  runtime-verifier-gate:
    name: Runtime Verifier Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect issue ID from branch
        id: issue
        run: |
          BRANCH="${{ github.head_ref }}"
          ISSUE_ID=$(echo "$BRANCH" | grep -oiP '(utv2|uni)-\d+' | head -1 | tr '[:lower:]' '[:upper:]')
          echo "id=${ISSUE_ID}" >> "$GITHUB_OUTPUT"
          echo "Branch: $BRANCH  →  Issue: ${ISSUE_ID:-<none>}"

      - name: Run runtime-verifier gate
        id: gate
        run: |
          ISSUE="${{ steps.issue.outputs.id }}"
          SHA="${{ github.event.pull_request.head.sha }}"
          PROOF_DIR="docs/06_status/proof/${ISSUE}"

          if [ -z "$ISSUE" ]; then
            echo "No issue ID found in branch name — skipping gate."
            echo "verdict=SKIP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -d "$PROOF_DIR" ]; then
            echo "Proof dir not found: $PROOF_DIR — gate not applicable for this PR."
            echo "verdict=SKIP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npx tsx scripts/ops/runtime-verifier-gate.ts \
            --proof-dir "$PROOF_DIR" \
            --sha "$SHA" \
            --json | tee gate-result.json

          VERDICT=$(cat gate-result.json | python3 -c "import sys,json; print(json.load(sys.stdin)['verdict'])")
          echo "verdict=${VERDICT}" >> "$GITHUB_OUTPUT"

          if [ "$VERDICT" != "PASS" ]; then
            echo "::error::Runtime verifier gate FAILED — see gate-result.json for details"
            exit 1
          fi

      - name: Upload gate result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-verifier-gate-${{ github.run_id }}.json
          path: gate-result.json
          retention-days: 14
