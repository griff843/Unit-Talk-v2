name: Deploy Monitoring

on:
  workflow_dispatch:
    inputs:
      force_recreate:
        description: 'Force-recreate Uptime Kuma container (resets if already running)'
        required: false
        type: boolean
        default: false

env:
  DEPLOY_HOST: ${{ secrets.UNIT_TALK_DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.UNIT_TALK_DEPLOY_USER }}
  DEPLOY_PATH: ${{ secrets.UNIT_TALK_DEPLOY_PATH }}

jobs:
  deploy-monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SECRET_DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
          SECRET_DISCORD_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK_URL }}
          SECRET_KUMA_PASSWORD: ${{ secrets.UPTIME_KUMA_ADMIN_PASSWORD }}
        run: |
          missing=()
          test -n "$DEPLOY_HOST"            || missing+=(UNIT_TALK_DEPLOY_HOST)
          test -n "$DEPLOY_USER"            || missing+=(UNIT_TALK_DEPLOY_USER)
          test -n "$DEPLOY_PATH"            || missing+=(UNIT_TALK_DEPLOY_PATH)
          test -n "$SECRET_DEPLOY_SSH_KEY"  || missing+=(UNIT_TALK_DEPLOY_SSH_KEY)
          test -n "$SECRET_DISCORD_WEBHOOK" || missing+=(DISCORD_OPS_WEBHOOK_URL)
          test -n "$SECRET_KUMA_PASSWORD"   || missing+=(UPTIME_KUMA_ADMIN_PASSWORD)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Required secrets not configured: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets present."

      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload monitoring files
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/monitoring' '$DEPLOY_PATH/scripts'"
          scp deploy/monitoring/docker-compose.monitoring.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/monitoring/docker-compose.monitoring.yml"
          scp deploy/monitoring/container-health-watch.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/scripts/container-health-watch.sh"
          scp deploy/monitoring/disk-alert.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/scripts/disk-alert.sh"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod +x '$DEPLOY_PATH/scripts/container-health-watch.sh' '$DEPLOY_PATH/scripts/disk-alert.sh'"

      - name: Write .env.monitoring on server
        env:
          DISCORD_OPS_WEBHOOK_URL: ${{ secrets.DISCORD_OPS_WEBHOOK_URL }}
        run: |
          # Pipe via stdin so webhook URL never appears in command arguments
          printf 'DISCORD_OPS_WEBHOOK_URL=%s\n' "$DISCORD_OPS_WEBHOOK_URL" \
            | ssh "$DEPLOY_USER@$DEPLOY_HOST" \
              "cat > '$DEPLOY_PATH/.env.monitoring' && chmod 600 '$DEPLOY_PATH/.env.monitoring' && echo 'Monitoring secrets written'"

      - name: Start Uptime Kuma
        env:
          FORCE_RECREATE: ${{ inputs.force_recreate }}
        run: |
          COMPOSE_FLAGS=""
          [ "$FORCE_RECREATE" = "true" ] && COMPOSE_FLAGS="--force-recreate"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH/monitoring' && \
             docker compose -f docker-compose.monitoring.yml up -d $COMPOSE_FLAGS"

      - name: Wait for Uptime Kuma to be ready
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            for i in \$(seq 1 30); do
              if curl -sf http://localhost:3001/api/info >/dev/null 2>&1; then
                echo 'Uptime Kuma is ready'
                exit 0
              fi
              echo \"Waiting... attempt \$i/30\"
              sleep 3
            done
            echo 'ERROR: Uptime Kuma did not become ready in 90 seconds'
            exit 1
          "

      - name: Configure Uptime Kuma (admin + API health monitor)
        env:
          UPTIME_KUMA_ADMIN_PASSWORD: ${{ secrets.UPTIME_KUMA_ADMIN_PASSWORD }}
        run: |
          # Write password to temp file on runner, SCP to server, use it, delete it
          # Avoids the password appearing in any command-line argument or shell expansion
          printf '%s' "$UPTIME_KUMA_ADMIN_PASSWORD" > /tmp/kuma-admin-pass
          chmod 600 /tmp/kuma-admin-pass
          scp -q /tmp/kuma-admin-pass "$DEPLOY_USER@$DEPLOY_HOST:/tmp/kuma-admin-pass"
          rm -f /tmp/kuma-admin-pass

          ssh "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' << 'SSHEOF'
          set -euo pipefail
          KUMA_PASS="$(cat /tmp/kuma-admin-pass)"
          rm -f /tmp/kuma-admin-pass

          # Helper: build JSON safely via Python (handles special chars in password)
          make_auth_json() {
            python3 -c "import json,sys;print(json.dumps({'username':'admin','password':sys.argv[1]}))" "$KUMA_PASS"
          }

          # Initial admin setup — idempotent, no-op if admin already exists
          SETUP_STATUS=$(curl -sf -X POST http://localhost:3001/setup \
            -H 'Content-Type: application/json' \
            -d "$(make_auth_json)" \
            -w '%{http_code}' -o /dev/null 2>/dev/null || echo '000')
          echo "Admin setup: HTTP $SETUP_STATUS"

          # Login to get auth token
          TOKEN=$(curl -sf -X POST http://localhost:3001/api/login \
            -H 'Content-Type: application/json' \
            -d "$(make_auth_json)" \
            2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('token',''))" \
            2>/dev/null || echo '')

          if [ -z "$TOKEN" ]; then
            echo "WARNING: Could not get auth token — add monitors manually via web UI"
            exit 0
          fi

          # Add Unit Talk API health monitor
          MON_STATUS=$(curl -sf -X POST http://localhost:3001/api/monitors \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"name":"Unit Talk API Health","type":"http","url":"http://api:4000/health","method":"GET","interval":60,"retryInterval":30,"maxretries":3,"active":1}' \
            -w '%{http_code}' -o /dev/null 2>/dev/null || echo '000')
          echo "API health monitor: HTTP $MON_STATUS"
          SSHEOF

      - name: Install cron jobs
        run: |
          SCRIPTS_PATH="$DEPLOY_PATH/scripts"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            # Health watcher: every 2 minutes
            (crontab -l 2>/dev/null | grep -v container-health-watch; \
             echo '*/2 * * * * ${SCRIPTS_PATH}/container-health-watch.sh >> /var/log/unit-talk-health-watch.log 2>&1') | crontab -

            # Disk alert: every hour at minute 5 (avoids congestion at :00)
            (crontab -l 2>/dev/null | grep -v disk-alert; \
             echo '5 * * * * ${SCRIPTS_PATH}/disk-alert.sh >> /var/log/unit-talk-disk-alert.log 2>&1') | crontab -

            echo 'Installed cron jobs:'
            crontab -l | grep unit-talk || echo '(none found)'
          "

      - name: Verify and report
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            echo '=== Uptime Kuma ==='
            docker ps --filter name=uptime-kuma --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo ''
            echo '=== Cron jobs ==='
            crontab -l | grep unit-talk || echo '(none)'
            echo ''
            echo '=== Monitoring env permissions ==='
            ls -la '$DEPLOY_PATH/.env.monitoring'
          "
          echo ""
          echo "=== ACCESS ==="
          echo "SSH tunnel: ssh -L 3001:localhost:3001 $DEPLOY_USER@$DEPLOY_HOST"
          echo "Then open:  http://localhost:3001"
          echo ""
          echo "=== MANUAL STEPS REMAINING ==="
          echo "1. SSH tunnel to server and open http://localhost:3001"
          echo "2. Log in (admin / UPTIME_KUMA_ADMIN_PASSWORD secret)"
          echo "3. Settings -> Notifications -> Add Discord webhook"
          echo "4. Assign the notification to the 'Unit Talk API Health' monitor"
          echo "5. Optionally add: host ping, ingestor/worker/discord-bot port monitors"
          echo ""
          echo "=== DISABLE ALERTS ==="
          echo "Cron scripts: ssh $DEPLOY_USER@$DEPLOY_HOST 'crontab -e'  # comment out unit-talk lines"
          echo "Uptime Kuma:  docker stop uptime-kuma"
