name: Deploy Monitoring

on:
  workflow_dispatch:
    inputs:
      force_recreate:
        description: 'Force-recreate Uptime Kuma container (resets if already running)'
        required: false
        type: boolean
        default: false

env:
  DEPLOY_HOST: ${{ secrets.UNIT_TALK_DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.UNIT_TALK_DEPLOY_USER }}
  DEPLOY_PATH: ${{ secrets.UNIT_TALK_DEPLOY_PATH }}

jobs:
  deploy-monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SECRET_DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
          SECRET_DISCORD_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK_URL }}
          SECRET_KUMA_PASSWORD: ${{ secrets.UPTIME_KUMA_ADMIN_PASSWORD }}
        run: |
          missing=()
          test -n "$DEPLOY_HOST"            || missing+=(UNIT_TALK_DEPLOY_HOST)
          test -n "$DEPLOY_USER"            || missing+=(UNIT_TALK_DEPLOY_USER)
          test -n "$DEPLOY_PATH"            || missing+=(UNIT_TALK_DEPLOY_PATH)
          test -n "$SECRET_DEPLOY_SSH_KEY"  || missing+=(UNIT_TALK_DEPLOY_SSH_KEY)
          test -n "$SECRET_DISCORD_WEBHOOK" || missing+=(DISCORD_OPS_WEBHOOK_URL)
          test -n "$SECRET_KUMA_PASSWORD"   || missing+=(UPTIME_KUMA_ADMIN_PASSWORD)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Required secrets not configured: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets present."

      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload monitoring files
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/monitoring' '$DEPLOY_PATH/scripts'"
          scp deploy/monitoring/docker-compose.monitoring.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/monitoring/docker-compose.monitoring.yml"
          scp deploy/monitoring/container-health-watch.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/scripts/container-health-watch.sh"
          scp deploy/monitoring/disk-alert.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/scripts/disk-alert.sh"
          scp deploy/monitoring/provision-kuma-monitors.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/scripts/provision-kuma-monitors.sh"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod +x '$DEPLOY_PATH/scripts/container-health-watch.sh' '$DEPLOY_PATH/scripts/disk-alert.sh' '$DEPLOY_PATH/scripts/provision-kuma-monitors.sh'"

      - name: Write .env.monitoring on server
        env:
          DISCORD_OPS_WEBHOOK_URL: ${{ secrets.DISCORD_OPS_WEBHOOK_URL }}
        run: |
          # Pipe via stdin so webhook URL never appears in command arguments
          printf 'DISCORD_OPS_WEBHOOK_URL=%s\n' "$DISCORD_OPS_WEBHOOK_URL" \
            | ssh "$DEPLOY_USER@$DEPLOY_HOST" \
              "cat > '$DEPLOY_PATH/.env.monitoring' && chmod 600 '$DEPLOY_PATH/.env.monitoring' && echo 'Monitoring secrets written'"

      - name: Start Uptime Kuma
        env:
          FORCE_RECREATE: ${{ inputs.force_recreate }}
        run: |
          if [ "$FORCE_RECREATE" = "true" ]; then
            # Wipe data volume so admin credentials reset cleanly
            ssh "$DEPLOY_USER@$DEPLOY_HOST" \
              "cd '$DEPLOY_PATH/monitoring' && \
               docker compose -f docker-compose.monitoring.yml down -v --remove-orphans 2>/dev/null || true"
          fi
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH/monitoring' && \
             docker compose -f docker-compose.monitoring.yml up -d"

      - name: Wait for Uptime Kuma to be ready
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            for i in \$(seq 1 30); do
              if curl -sf http://localhost:3001/api/info >/dev/null 2>&1; then
                echo 'Uptime Kuma is ready'
                exit 0
              fi
              echo \"Waiting... attempt \$i/30\"
              sleep 3
            done
            echo 'ERROR: Uptime Kuma did not become ready in 90 seconds'
            exit 1
          "

      - name: Provision all Uptime Kuma monitors and notifications
        env:
          UPTIME_KUMA_ADMIN_PASSWORD: ${{ secrets.UPTIME_KUMA_ADMIN_PASSWORD }}
        run: |
          # Write password to temp file on runner, SCP to server, let script read+delete it.
          # Secret never appears in command-line arguments or shell expansion.
          printf '%s' "$UPTIME_KUMA_ADMIN_PASSWORD" > /tmp/kuma-pass
          chmod 600 /tmp/kuma-pass
          scp -q /tmp/kuma-pass "$DEPLOY_USER@$DEPLOY_HOST:/tmp/kuma-pass"
          rm -f /tmp/kuma-pass
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' bash '$DEPLOY_PATH/scripts/provision-kuma-monitors.sh'"

      - name: Install cron jobs
        run: |
          # SCRIPTS_PATH expands on the runner (from DEPLOY_PATH env var) before SSH
          SCRIPTS_PATH="${DEPLOY_PATH}/scripts"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            # Health watcher: every 2 minutes
            (crontab -l 2>/dev/null | grep -v container-health-watch; \
             printf '*/2 * * * * ${SCRIPTS_PATH}/container-health-watch.sh >> /var/log/unit-talk-health-watch.log 2>&1\n') | crontab -

            # Disk alert: every hour at minute 5 (avoids congestion at :00)
            (crontab -l 2>/dev/null | grep -v disk-alert; \
             printf '5 * * * * ${SCRIPTS_PATH}/disk-alert.sh >> /var/log/unit-talk-disk-alert.log 2>&1\n') | crontab -

            echo 'Installed cron jobs:'
            crontab -l | grep -E 'container-health-watch|disk-alert' || echo '(none found — check DEPLOY_PATH expansion)'
          "

      - name: Verify and report
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            echo '=== Uptime Kuma ==='
            docker ps --filter name=uptime-kuma --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo ''
            echo '=== Cron jobs ==='
            crontab -l | grep unit-talk || echo '(none)'
            echo ''
            echo '=== Monitoring env permissions ==='
            ls -la '$DEPLOY_PATH/.env.monitoring'
          "
          echo ""
          echo "=== ACCESS ==="
          echo "SSH tunnel: ssh -L 3001:localhost:3001 $DEPLOY_USER@$DEPLOY_HOST"
          echo "Then open:  http://localhost:3001"
          echo ""
          echo "=== PROVISIONED (automated) ==="
          echo "1. Discord Ops notification (webhook from DISCORD_OPS_WEBHOOK_URL secret)"
          echo "2. Unit Talk API Health        — HTTP http://api:4000/health          60s"
          echo "3. Unit Talk Host Ping         — Ping 46.225.14.123                   60s"
          echo "4. Unit Talk Worker Liveness   — HTTP http://api:4000/health?full=true 60s"
          echo "5. Unit Talk Ingestor Freshness — HTTP http://api:4000/health?full=true 60s"
          echo "6. Unit Talk Discord Bot        — Docker container or HTTP fallback     60s"
          echo ""
          echo "=== DISABLE ALERTS ==="
          echo "Cron scripts: ssh $DEPLOY_USER@$DEPLOY_HOST 'crontab -e'  # comment out unit-talk lines"
          echo "Uptime Kuma:  docker stop uptime-kuma"
