name: invariant-registry-gate

on:
  pull_request:
    paths:
      - 'packages/invariants/**'
      - 'packages/contracts/src/invariant-registry.ts'

permissions:
  contents: read

jobs:
  registry-validation:
    name: Invariant registry consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate invariant registry (fail-closed)
        run: |
          npx tsx scripts/ci/invariant-registry-gate.ts --json | tee /tmp/registry-result.json
          npx tsx scripts/ci/invariant-registry-gate.ts

      - name: Emit registry hash as step summary
        if: always()
        run: |
          HASH=$(npx tsx scripts/ci/invariant-registry-gate.ts --json | npx tsx -e \
            "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d).registry_hash)")
          echo "## Invariant Registry Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "Registry SHA-256: \`${HASH}\`" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/registry-result.json >> "$GITHUB_STEP_SUMMARY"
