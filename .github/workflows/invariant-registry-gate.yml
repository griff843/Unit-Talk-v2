name: invariant-registry-gate

on:
  pull_request:
    paths:
      - 'packages/invariants/**'
      - 'packages/contracts/src/invariant-registry.ts'
      - 'packages/contracts/src/index.ts'
      - 'scripts/ci/invariant-registry-gate.ts'
      - '.github/workflows/invariant-registry-gate.yml'

permissions:
  contents: read

jobs:
  registry-validation:
    name: Invariant registry consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate invariant registry (fail-closed)
        run: |
          npx tsx scripts/ci/invariant-registry-gate.ts \
            --base origin/${{ github.base_ref }} \
            --json | tee /tmp/registry-result.json
          # Re-run without --json for human-readable annotation
          npx tsx scripts/ci/invariant-registry-gate.ts \
            --base origin/${{ github.base_ref }}

      - name: Emit registry hash as step summary
        if: always()
        run: |
          if [[ -f /tmp/registry-result.json ]]; then
            HASH=$(jq -r '.registry_hash' /tmp/registry-result.json)
            echo "## Invariant Registry Gate" >> "$GITHUB_STEP_SUMMARY"
            echo "Registry SHA-256: \`${HASH}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/registry-result.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
