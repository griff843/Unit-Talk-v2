name: Return Review Packet

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  return-review-packet:
    name: Return review packet
    runs-on: ubuntu-latest
    steps:
      - name: Detect T1/T2 PR
        id: tier
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(label => label.name);
            const tier = labels.find(label => label === 'tier:T1' || label === 'tier:T2') || '';
            core.setOutput('tier', tier);
            core.setOutput('required', tier ? 'true' : 'false');

      - name: Checkout
        if: steps.tier.outputs.required == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: steps.tier.outputs.required == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        if: steps.tier.outputs.required == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.tier.outputs.required == 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate return review packet
        if: steps.tier.outputs.required == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="$(echo "${{ github.event.pull_request.head.ref }}" | sed -nE 's/.*(utv2|UTV2)-([0-9]+).*/UTV2-\2/p')"
          if [ -z "$ISSUE" ]; then
            echo "Unable to infer UTV2 issue id from branch ${{ github.event.pull_request.head.ref }}"
            exit 1
          fi
          pnpm ops:pr-review-packet -- \
            --issue "$ISSUE" \
            --pr "${{ github.event.pull_request.number }}" \
            --base "origin/${{ github.event.pull_request.base.ref }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --output "artifacts/return-review-packet.json" \
            --risk-output "artifacts/pr-risk-packet.json" \
            --json

      - name: Upload return review packet
        if: steps.tier.outputs.required == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: return-review-packet
          path: |
            artifacts/return-review-packet.json
            artifacts/pr-risk-packet.json
          if-no-files-found: ignore
