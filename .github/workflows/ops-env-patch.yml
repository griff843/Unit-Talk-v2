name: Ops — Patch env.production

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DEPLOY_HOST: ${{ secrets.UNIT_TALK_DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.UNIT_TALK_DEPLOY_USER }}
  DEPLOY_PATH: ${{ secrets.UNIT_TALK_DEPLOY_PATH }}

jobs:
  patch:
    name: Patch env and restart worker
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Show and fix UNIT_TALK_DISCORD_TARGET_MAP
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            echo '=== CURRENT TARGET MAP LINE ==='
            grep 'UNIT_TALK_DISCORD_TARGET_MAP' '$DEPLOY_PATH/.env.production' | head -1

            echo ''
            echo '=== FIXING: replacing with valid empty JSON ==='
            sed -i 's|^UNIT_TALK_DISCORD_TARGET_MAP=.*|UNIT_TALK_DISCORD_TARGET_MAP={}|' '$DEPLOY_PATH/.env.production'

            echo '=== VERIFIED NEW VALUE ==='
            grep 'UNIT_TALK_DISCORD_TARGET_MAP' '$DEPLOY_PATH/.env.production' | head -1

            echo ''
            echo '=== RESTARTING WORKER ==='
            cd '$DEPLOY_PATH'
            docker compose restart worker
            sleep 5
            docker ps --filter name=unit-talk-worker --format 'table {{.Names}}\t{{.Status}}'
          "
