name: Linear Auto-Close

# On push to main, parse explicit close-intent markers from the head commit
# message and move the referenced Linear issue(s) to Done with a merge-SHA
# comment.
#
# This workflow closes Linear issues ONLY when the commit message contains an
# explicit close-intent marker, following the same conventions as GitHub's
# own issue auto-closing syntax:
#
#   - Closes UTV2-NNN     (inline verb, case-insensitive on the verb)
#   - Fixes UTV2-NNN      (inline verb, case-insensitive on the verb)
#   - Resolves UTV2-NNN   (inline verb, case-insensitive on the verb)
#   - Linear-Close: UTV2-NNN   (commit trailer, anchored to line start)
#
# Free-form mentions like "UTV2-NNN dispatch packet", "follow-up to UTV2-NNN",
# file path literals, code examples, or "supersedes UTV2-NNN" wording are
# IGNORED. This prevents the false-positive class that caused an earlier
# packet-describing PR to incorrectly close the target issue.
#
# Identifier prefix is case-sensitive — `UTV2-NNN` matches, `utv2-NNN` does
# not. This ensures conventional-commit scope prefixes like `feat(utv2-519):`
# cannot trigger a close on their own. Use the explicit close-intent verb in
# a separate position to close.
#
# Extraction logic lives in `.github/workflows/linear-auto-close.test.sh`,
# which also contains a standalone test harness. Run the harness manually:
#
#   bash .github/workflows/linear-auto-close.test.sh
#
# Any change to the extraction regex MUST be accompanied by a test update in
# the same PR. The harness runs 22 positive and negative cases covering the
# full intended behavior, including the original false-positive incident.
#
# Requirements:
#   - Repo secret LINEAR_API_TOKEN with scope sufficient to read + update
#     issues and create comments. Generate at https://linear.app/settings/api
#     and add via Settings > Secrets and variables > Actions.
#
# Safety:
#   - Only fires on push to main.
#   - Skips silently if LINEAR_API_TOKEN is not configured (first-time setup).
#   - Idempotent: re-running against an already-Done issue only attaches the
#     merge-SHA comment; it does not error.
#   - Never creates new issues, never moves issues to states other than Done,
#     never deletes anything.

on:
  push:
    branches:
      - main

jobs:
  linear-auto-close:
    name: Close Linear issues referenced in merge commit
    runs-on: ubuntu-latest

    steps:
      - name: Skip if Linear token not configured
        id: guard
        env:
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
        run: |
          if [ -z "$LINEAR_API_TOKEN" ]; then
            echo "LINEAR_API_TOKEN secret not set — skipping auto-close."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo (for extraction function)
        if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          # Minimal checkout — only the workflow files are needed for the
          # extraction function. No history, no LFS, no submodules.
          fetch-depth: 1

      - name: Extract close-intent issue IDs from commit message
        if: steps.guard.outputs.configured == 'true'
        id: extract
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Source the shared extraction function from the test file.
          # The function parses the commit message and emits only identifiers
          # referenced with an explicit close-intent marker. Sourcing the test
          # file ensures the workflow and the test harness cannot drift apart.
          # shellcheck disable=SC1091
          source .github/workflows/linear-auto-close.test.sh

          ids=$(extract_linear_close_ids "$COMMIT_MSG")
          subject=$(echo "$COMMIT_MSG" | head -n 1)
          if [ -z "$ids" ]; then
            echo "::notice title=linear-auto-close::decision=no_close reason=no_close_intent commit=\"$subject\""
            echo "ids=" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=linear-auto-close::decision=will_close ids=\"$ids\" commit=\"$subject\""
            echo "ids=$ids" >> "$GITHUB_OUTPUT"
          fi

      - name: Move issues to Done and attach merge SHA
        if: steps.guard.outputs.configured == 'true' && steps.extract.outputs.ids != ''
        env:
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          IDS: ${{ steps.extract.outputs.ids }}
          MERGE_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_SUBJECT: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          # Fetch the Done state id for team unit-talk-v2 once
          # Use the team UUID, not the name slug. Linear's team(id:) requires UUID.
          team_query='{"query":"query { team(id: \"00075741-4bdd-49ac-942e-eee06cc56fb5\") { states { nodes { id name type } } } }"}'
          team_resp=$(curl -sS -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$team_query")

          done_state_id=$(echo "$team_resp" | jq -r '.data.team.states.nodes[] | select(.name=="Done") | .id')
          if [ -z "$done_state_id" ] || [ "$done_state_id" = "null" ]; then
            echo "::warning title=Linear state lookup failed::Could not resolve Done state id. Team response: $team_resp"
            exit 0
          fi
          echo "Resolved Done state id: $done_state_id"

          short_sha="${MERGE_SHA:0:7}"
          # Extract the commit subject (first line only)
          subject=$(echo "$COMMIT_SUBJECT" | head -n 1)

          for identifier in $IDS; do
            echo "---"
            echo "Processing $identifier..."

            # Look up the issue by identifier to get its UUID
            lookup_query="{\"query\":\"query { issue(id: \\\"$identifier\\\") { id state { name } } }\"}"
            lookup_resp=$(curl -sS -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$lookup_query")

            issue_uuid=$(echo "$lookup_resp" | jq -r '.data.issue.id')
            current_state=$(echo "$lookup_resp" | jq -r '.data.issue.state.name')

            if [ -z "$issue_uuid" ] || [ "$issue_uuid" = "null" ]; then
              echo "::warning title=Issue not found::$identifier not found in Linear. Response: $lookup_resp"
              continue
            fi

            echo "  uuid=$issue_uuid current_state=$current_state"

            if [ "$current_state" = "Done" ]; then
              echo "  already Done — attaching merge comment only"
            else
              # Update to Done
              update_query=$(jq -n \
                --arg id "$issue_uuid" \
                --arg state "$done_state_id" \
                '{query: "mutation UpdateIssue($id: String!, $state: String!) { issueUpdate(id: $id, input: { stateId: $state }) { success } }", variables: {id: $id, state: $state}}')

              update_resp=$(curl -sS -X POST https://api.linear.app/graphql \
                -H "Authorization: $LINEAR_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$update_query")

              success=$(echo "$update_resp" | jq -r '.data.issueUpdate.success')
              if [ "$success" = "true" ]; then
                echo "  moved to Done"
              else
                echo "::warning title=Issue update failed::$identifier update response: $update_resp"
                continue
              fi
            fi

            # Post a comment with the merge SHA + commit URL
            comment_body="Merged to main: [\`$short_sha\`]($COMMIT_URL) — $subject"
            comment_query=$(jq -n \
              --arg id "$issue_uuid" \
              --arg body "$comment_body" \
              '{query: "mutation CreateComment($id: String!, $body: String!) { commentCreate(input: { issueId: $id, body: $body }) { success } }", variables: {id: $id, body: $body}}')

            comment_resp=$(curl -sS -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$comment_query")

            comment_ok=$(echo "$comment_resp" | jq -r '.data.commentCreate.success')
            if [ "$comment_ok" = "true" ]; then
              echo "  merge comment attached"
            else
              echo "::warning title=Comment create failed::$identifier comment response: $comment_resp"
            fi
          done
