name: R-Level Compliance Check

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  r-level-compliance-check:
    name: R-Level Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run R-level check
        id: r_level_check
        run: |
          set +e
          pnpm exec tsx scripts/ci/r-level-check.ts --base origin/main --head HEAD --output-json /tmp/r-level-report.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Comment on failed R-level check
        if: steps.r_level_check.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const report = JSON.parse(fs.readFileSync('/tmp/r-level-report.json', 'utf8'));
            const artifactLevels = {
              'r2-determinism': 'R2',
              'r3-shadow-report': 'R3',
              'r4-fault-report': 'R4',
              'r5-strategy-proof': 'R5',
              'qa-experience-report': 'qa-experience'
            };
            const artifacts = Object.entries(report.artifacts ?? {})
              .filter(([, artifact]) => artifact.required === true && artifact.found !== true)
              .map(([name]) => `| ${name} | ${artifactLevels[name] ?? 'required'} | ✗ Missing |`);
            const nextActions = Array.isArray(report.nextActions)
              ? report.nextActions.join('<br>')
              : String(report.nextActions ?? 'Produce the missing required artifacts.');
            const body = [
              '## R-Level Compliance Check — FAILED',
              '',
              'This PR touches paths that require the following R-level artifacts:',
              '',
              '| Artifact | Required | Status |',
              '|----------|----------|--------|',
              ...artifacts,
              '',
              `**Next action:** ${nextActions}`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail on missing R-level artifacts
        if: steps.r_level_check.outputs.exit_code == '1'
        run: exit 1
