name: R-Level Compliance Check

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  r-level-compliance-check:
    name: R-Level Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch PR body
        run: |
          gh pr view ${{ github.event.pull_request.number }} --json body -q .body > /tmp/pr-body.txt || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run R-level check
        id: r_level_check
        run: |
          set +e
          pnpm exec tsx scripts/ci/r-level-check.ts --base origin/main --head HEAD --output-json /tmp/r-level-report.json --pr-body-file /tmp/pr-body.txt
          exit_code=$?
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Post R-level check result comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const exitCode = '${{ steps.r_level_check.outputs.exit_code }}';
            const marker = '<!-- r-level-check -->';

            let body;
            if (exitCode === '1') {
              const report = JSON.parse(fs.readFileSync('/tmp/r-level-report.json', 'utf8'));
              const artifactLevels = {
                'r2-determinism': 'R2',
                'r3-shadow-report': 'R3',
                'r4-fault-report': 'R4',
                'r5-strategy-proof': 'R5',
                'qa-experience-report': 'qa-experience'
              };
              const artifacts = Object.entries(report.artifacts ?? {})
                .filter(([, artifact]) => artifact.required === true && artifact.found !== true)
                .map(([name]) => `| ${name} | ${artifactLevels[name] ?? 'required'} | ✗ Missing |`);
              const nextActions = Array.isArray(report.nextActions)
                ? report.nextActions.join('<br>')
                : String(report.nextActions ?? 'Produce the missing required artifacts.');
              body = [
                marker,
                '## R-Level Compliance Check — ✗ FAILED',
                '',
                'This PR touches paths that require the following R-level artifacts:',
                '',
                '| Artifact | Required | Status |',
                '|----------|----------|--------|',
                ...artifacts,
                '',
                `**Next action:** ${nextActions}`
              ].join('\n');
            } else {
              body = [
                marker,
                '<details>',
                '<summary>R-Level Compliance Check — ✓ PASSED</summary>',
                '',
                'All required R-level artifacts present.',
                '',
                '</details>'
              ].join('\n');
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on missing R-level artifacts
        if: steps.r_level_check.outputs.exit_code == '1'
        run: exit 1
