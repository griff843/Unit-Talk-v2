name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Container image tag to deploy. Defaults to the workflow SHA.'
        required: false
        type: string
      rollback_tag:
        description: 'Optional previous image tag to restore if deployment fails.'
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/griff843/unit-talk-v2
  DEPLOY_HOST: ${{ secrets.UNIT_TALK_DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.UNIT_TALK_DEPLOY_USER }}
  DEPLOY_PATH: ${{ secrets.UNIT_TALK_DEPLOY_PATH }}
  DEPLOY_HEALTH_URL: ${{ secrets.UNIT_TALK_DEPLOY_HEALTH_URL }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production secret inventory
        env:
          SECRET_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SECRET_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SECRET_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SECRET_DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          SECRET_DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          SECRET_UNIT_TALK_BOT_API_KEY: ${{ secrets.UNIT_TALK_BOT_API_KEY }}
          SECRET_UNIT_TALK_INGESTOR_API_KEY: ${{ secrets.UNIT_TALK_INGESTOR_API_KEY }}
          SECRET_SGO_API_KEY: ${{ secrets.SGO_API_KEY }}
          SECRET_UNIT_TALK_DEPLOY_HOST: ${{ secrets.UNIT_TALK_DEPLOY_HOST }}
          SECRET_UNIT_TALK_DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          missing=()
          test -n "$SECRET_SUPABASE_URL"              || missing+=(SUPABASE_URL)
          test -n "$SECRET_SUPABASE_ANON_KEY"         || missing+=(SUPABASE_ANON_KEY)
          test -n "$SECRET_SUPABASE_SERVICE_ROLE_KEY" || missing+=(SUPABASE_SERVICE_ROLE_KEY)
          test -n "$SECRET_DISCORD_BOT_TOKEN"         || missing+=(DISCORD_BOT_TOKEN)
          test -n "$SECRET_DISCORD_CLIENT_ID"         || missing+=(DISCORD_CLIENT_ID)
          test -n "$SECRET_UNIT_TALK_BOT_API_KEY"     || missing+=(UNIT_TALK_BOT_API_KEY)
          test -n "$SECRET_UNIT_TALK_INGESTOR_API_KEY" || missing+=(UNIT_TALK_INGESTOR_API_KEY)
          test -n "$SECRET_SGO_API_KEY"              || missing+=(SGO_API_KEY)
          test -n "$SECRET_UNIT_TALK_DEPLOY_HOST"    || missing+=(UNIT_TALK_DEPLOY_HOST)
          test -n "$SECRET_UNIT_TALK_DEPLOY_SSH_KEY" || missing+=(UNIT_TALK_DEPLOY_SSH_KEY)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Required production secrets are not configured: ${missing[*]}"
            exit 1
          fi
          echo "All required production secrets are present."

      - name: Create CI local.env (dev defaults + Supabase — required for t1-proof tests)
        run: |
          cat .env.example > local.env
          cat <<'EOF' >> local.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF

      # UTV2-1288 deploy hotfix (PM-approved 2026-06-22): pre-deploy gate validates
      # STATIC correctness/buildability only. Live-DB T1 proof is enforced pre-merge by
      # the T1 Proof Gate (fail-closed for tier:T1); re-running the full live-DB suite
      # here is redundant and amplifies an active Supabase write-path degradation
      # (see UTV2-1290/1291/1292). This does NOT weaken T1: nothing merges to main
      # without live proof; the deploy gate is post-merge operational validation.
      - name: Run test suite (dev env — static correctness gate before gate env is written)
        run: pnpm verify:static

      - name: Write deploy gate env
        run: |
          cat <<'EOF' > local.env
          NODE_ENV=production
          UNIT_TALK_APP_ENV=production
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UNIT_TALK_API_RUNTIME_MODE=fail_closed
          UNIT_TALK_INGESTOR_RUNTIME_MODE=fail_closed
          UNIT_TALK_WORKER_RUNTIME_MODE=fail_closed
          UNIT_TALK_DISCORD_BOT_RUNTIME_MODE=fail_closed
          UNIT_TALK_INGESTOR_AUTORUN=true
          UNIT_TALK_INGESTOR_MAX_CYCLES=0
          UNIT_TALK_WORKER_AUTORUN=true
          UNIT_TALK_WORKER_MAX_CYCLES=0
          UNIT_TALK_WORKER_ADAPTER=discord
          UNIT_TALK_WORKER_DRY_RUN=false
          DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
          UNIT_TALK_BOT_API_KEY=${{ secrets.UNIT_TALK_BOT_API_KEY }}
          UNIT_TALK_INGESTOR_API_KEY=${{ secrets.UNIT_TALK_INGESTOR_API_KEY }}
          SGO_API_KEY=${{ secrets.SGO_API_KEY }}
          SYNDICATE_MACHINE_ENABLED=true
          EOF

      - name: Validate progressive delivery contract
        run: npx tsx scripts/deploy-check.ts --skip-verify

  rollback-dry-run:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate rollback dry-run
        run: bash deploy/rollback.sh --dry-run --tag "${{ inputs.rollback_tag || github.sha }}"

  build:
    needs: [verify, rollback-dry-run]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, ingestor, discord-bot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ inputs.image_tag || github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            UNIT_TALK_GIT_SHA=${{ github.sha }}
            UNIT_TALK_BUILD_TIMESTAMP=${{ github.event.head_commit.timestamp }}

  canary:
    name: Canary deploy
    needs: build
    runs-on: ubuntu-latest
    environment: canary
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$DEPLOY_HEALTH_URL"

      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Write .env.production to server
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CAPPER_ROLE_ID: ${{ secrets.DISCORD_CAPPER_ROLE_ID }}
          DISCORD_VIP_ROLE_ID: ${{ secrets.DISCORD_VIP_ROLE_ID }}
          DISCORD_VIP_PLUS_ROLE_ID: ${{ secrets.DISCORD_VIP_PLUS_ROLE_ID }}
          DISCORD_CAPPER_CHANNEL_ID: ${{ secrets.DISCORD_CAPPER_CHANNEL_ID }}
          DISCORD_OPERATOR_ROLE_ID: ${{ secrets.DISCORD_OPERATOR_ROLE_ID }}
          UNIT_TALK_BOT_API_KEY: ${{ secrets.UNIT_TALK_BOT_API_KEY }}
          UNIT_TALK_INGESTOR_API_KEY: ${{ secrets.UNIT_TALK_INGESTOR_API_KEY }}
          UNIT_TALK_DISTRIBUTION_TARGETS: ${{ secrets.UNIT_TALK_DISTRIBUTION_TARGETS }}
          UNIT_TALK_DISCORD_TARGET_MAP: ${{ secrets.UNIT_TALK_DISCORD_TARGET_MAP }}
          UNIT_TALK_ENABLED_TARGETS: ${{ secrets.UNIT_TALK_ENABLED_TARGETS }}
          SGO_API_KEY: ${{ secrets.SGO_API_KEY }}
          SGO_API_KEY_FALLBACK: ${{ secrets.SGO_API_KEY_FALLBACK }}
          CADDY_DOMAIN: ${{ secrets.CADDY_DOMAIN }}
          UNIT_TALK_OPS_ALERT_WEBHOOK_URL: ${{ secrets.UNIT_TALK_OPS_ALERT_WEBHOOK_URL }}
          BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
        run: |
          # Resolve worker distribution target and promotion target coverage.
          # The worker must cover all *enabled* promotion targets (default: best-bets,
          # trader-insights). When channel secrets aren't configured we disable all
          # promotion targets so coverage check passes and the worker starts cleanly.
          _dist_targets="${UNIT_TALK_DISTRIBUTION_TARGETS:-}"
          _enabled_targets="${UNIT_TALK_ENABLED_TARGETS:-}"
          if [ -z "$_dist_targets" ] && [ -n "${DISCORD_CAPPER_CHANNEL_ID:-}" ]; then
            _dist_targets="discord:${DISCORD_CAPPER_CHANNEL_ID}"
          elif [ -z "$_dist_targets" ]; then
            # No channel IDs configured: use a valid-format placeholder and disable
            # all promotion targets so the target-coverage check doesn't block startup.
            _dist_targets="discord:0"
            [ -z "$_enabled_targets" ] && _enabled_targets="none"
          fi
          _target_map="${UNIT_TALK_DISCORD_TARGET_MAP:-}"
          [ -z "$_target_map" ] && _target_map='{}'
          # Discord bot requires non-empty strings for guild/role/channel IDs.
          # Use "0" as a placeholder when secrets aren't configured so the bot starts
          # instead of crash-looping; deliveries to placeholder IDs will fail gracefully.
          _guild_id="${DISCORD_GUILD_ID:-0}"
          _capper_role="${DISCORD_CAPPER_ROLE_ID:-0}"
          _vip_role="${DISCORD_VIP_ROLE_ID:-0}"
          _vip_plus_role="${DISCORD_VIP_PLUS_ROLE_ID:-0}"
          _capper_channel="${DISCORD_CAPPER_CHANNEL_ID:-0}"
          printf '%s\n' \
            "NODE_ENV=production" \
            "UNIT_TALK_APP_ENV=production" \
            "UNIT_TALK_API_URL=http://api:4000" \
            "SUPABASE_URL=$SUPABASE_URL" \
            "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" \
            "UNIT_TALK_API_RUNTIME_MODE=fail_closed" \
            "UNIT_TALK_INGESTOR_RUNTIME_MODE=fail_closed" \
            "UNIT_TALK_WORKER_RUNTIME_MODE=fail_closed" \
            "UNIT_TALK_DISCORD_BOT_RUNTIME_MODE=fail_closed" \
            "UNIT_TALK_API_RATE_LIMIT_STORE=supabase_rpc" \
            "UNIT_TALK_API_RATE_LIMIT_KEY_STRATEGY=authenticated_identity" \
            "UNIT_TALK_INGESTOR_AUTORUN=true" \
            "UNIT_TALK_INGESTOR_MAX_CYCLES=0" \
            "UNIT_TALK_INGESTOR_SCHEDULING_ENABLED=true" \
            "UNIT_TALK_INGESTOR_PEAK_POLL_MS=30000" \
            "UNIT_TALK_INGESTOR_OFFPEAK_POLL_MS=300000" \
            "UNIT_TALK_INGESTOR_PEAK_START_HOUR_ET=12" \
            "UNIT_TALK_INGESTOR_PEAK_END_HOUR_ET=24" \
            "UNIT_TALK_INGESTOR_PINNACLE_ONLY_PEAK=true" \
            "UNIT_TALK_WORKER_ID=worker-prod" \
            "UNIT_TALK_WORKER_AUTORUN=true" \
            "UNIT_TALK_WORKER_MAX_CYCLES=0" \
            "UNIT_TALK_WORKER_ADAPTER=discord" \
            "UNIT_TALK_WORKER_DRY_RUN=false" \
            "UNIT_TALK_DISTRIBUTION_TARGETS=$_dist_targets" \
            "UNIT_TALK_DISCORD_TARGET_MAP=$_target_map" \
            "UNIT_TALK_ENABLED_TARGETS=${_enabled_targets:-best-bets}" \
            "DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN" \
            "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" \
            "DISCORD_GUILD_ID=$_guild_id" \
            "DISCORD_CAPPER_ROLE_ID=$_capper_role" \
            "DISCORD_VIP_ROLE_ID=$_vip_role" \
            "DISCORD_VIP_PLUS_ROLE_ID=$_vip_plus_role" \
            "DISCORD_CAPPER_CHANNEL_ID=$_capper_channel" \
            "DISCORD_OPERATOR_ROLE_ID=${DISCORD_OPERATOR_ROLE_ID:-0}" \
            "UNIT_TALK_BOT_API_KEY=$UNIT_TALK_BOT_API_KEY" \
            "UNIT_TALK_INGESTOR_API_KEY=$UNIT_TALK_INGESTOR_API_KEY" \
            "SGO_API_KEY=$SGO_API_KEY" \
            "SGO_API_KEY_FALLBACK=${SGO_API_KEY_FALLBACK:-}" \
            "SYNDICATE_MACHINE_ENABLED=true" \
            "UNIT_TALK_GRADING_CRON_AUTORUN=true" \
            "UNIT_TALK_OPS_ALERT_WEBHOOK_URL=${UNIT_TALK_OPS_ALERT_WEBHOOK_URL:-}" \
            "CADDY_DOMAIN=${CADDY_DOMAIN:-}" \
            "UNIT_TALK_BUILD_TIMESTAMP=${BUILD_TIMESTAMP:-}" \
            "UNIT_TALK_DEPLOYMENT_ID=${IMAGE_TAG:-}" \
            | ssh "$DEPLOY_USER@$DEPLOY_HOST" \
                "cat > '$DEPLOY_PATH/.env.production' && chmod 600 '$DEPLOY_PATH/.env.production' && echo 'env.production written'"

      - name: Upload compose manifest and config files
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp deploy/production/docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"
          scp deploy/production/loki-config.yaml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/loki-config.yaml"
          scp deploy/production/Caddyfile "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/Caddyfile"

      - name: Authenticate GHCR on remote
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: printf '%s' "$GHCR_PAT" | ssh "$DEPLOY_USER@$DEPLOY_HOST" 'docker login ghcr.io -u griff843 --password-stdin'

      - name: Release API canary
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
          ROLLBACK_TAG: ${{ inputs.rollback_tag }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu && cd '$DEPLOY_PATH' && \
             if [ -f .unit-talk-release ]; then cp .unit-talk-release .unit-talk-release.previous; fi && \
             printf '%s\n' '$IMAGE_TAG' > .unit-talk-release && \
             UNIT_TALK_IMAGE_TAG='$IMAGE_TAG' docker compose pull && \
             UNIT_TALK_IMAGE_TAG='$IMAGE_TAG' docker compose up -d --no-deps api"
          for attempt in $(seq 1 30); do
            if ssh "$DEPLOY_USER@$DEPLOY_HOST" "curl -fsS http://localhost:4000/health >/dev/null 2>&1"; then
              exit 0
            fi
            sleep 10
          done
          if [ -n "$ROLLBACK_TAG" ]; then
            bash deploy/rollback.sh --tag "$ROLLBACK_TAG" --host "$DEPLOY_HOST" --user "$DEPLOY_USER" --path "$DEPLOY_PATH"
          fi
          exit 1

  promote:
    name: Promote production
    needs: canary
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$DEPLOY_HEALTH_URL"

      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Write .env.production to server
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CAPPER_ROLE_ID: ${{ secrets.DISCORD_CAPPER_ROLE_ID }}
          DISCORD_VIP_ROLE_ID: ${{ secrets.DISCORD_VIP_ROLE_ID }}
          DISCORD_VIP_PLUS_ROLE_ID: ${{ secrets.DISCORD_VIP_PLUS_ROLE_ID }}
          DISCORD_CAPPER_CHANNEL_ID: ${{ secrets.DISCORD_CAPPER_CHANNEL_ID }}
          DISCORD_OPERATOR_ROLE_ID: ${{ secrets.DISCORD_OPERATOR_ROLE_ID }}
          UNIT_TALK_BOT_API_KEY: ${{ secrets.UNIT_TALK_BOT_API_KEY }}
          UNIT_TALK_INGESTOR_API_KEY: ${{ secrets.UNIT_TALK_INGESTOR_API_KEY }}
          UNIT_TALK_DISTRIBUTION_TARGETS: ${{ secrets.UNIT_TALK_DISTRIBUTION_TARGETS }}
          UNIT_TALK_DISCORD_TARGET_MAP: ${{ secrets.UNIT_TALK_DISCORD_TARGET_MAP }}
          UNIT_TALK_ENABLED_TARGETS: ${{ secrets.UNIT_TALK_ENABLED_TARGETS }}
          SGO_API_KEY: ${{ secrets.SGO_API_KEY }}
          SGO_API_KEY_FALLBACK: ${{ secrets.SGO_API_KEY_FALLBACK }}
          CADDY_DOMAIN: ${{ secrets.CADDY_DOMAIN }}
          UNIT_TALK_OPS_ALERT_WEBHOOK_URL: ${{ secrets.UNIT_TALK_OPS_ALERT_WEBHOOK_URL }}
          BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
        run: |
          # Resolve worker distribution target and promotion target coverage.
          # The worker must cover all *enabled* promotion targets (default: best-bets,
          # trader-insights). When channel secrets aren't configured we disable all
          # promotion targets so coverage check passes and the worker starts cleanly.
          _dist_targets="${UNIT_TALK_DISTRIBUTION_TARGETS:-}"
          _enabled_targets="${UNIT_TALK_ENABLED_TARGETS:-}"
          if [ -z "$_dist_targets" ] && [ -n "${DISCORD_CAPPER_CHANNEL_ID:-}" ]; then
            _dist_targets="discord:${DISCORD_CAPPER_CHANNEL_ID}"
          elif [ -z "$_dist_targets" ]; then
            # No channel IDs configured: use a valid-format placeholder and disable
            # all promotion targets so the target-coverage check doesn't block startup.
            _dist_targets="discord:0"
            [ -z "$_enabled_targets" ] && _enabled_targets="none"
          fi
          _target_map="${UNIT_TALK_DISCORD_TARGET_MAP:-}"
          [ -z "$_target_map" ] && _target_map='{}'
          # Discord bot requires non-empty strings for guild/role/channel IDs.
          # Use "0" as a placeholder when secrets aren't configured so the bot starts
          # instead of crash-looping; deliveries to placeholder IDs will fail gracefully.
          _guild_id="${DISCORD_GUILD_ID:-0}"
          _capper_role="${DISCORD_CAPPER_ROLE_ID:-0}"
          _vip_role="${DISCORD_VIP_ROLE_ID:-0}"
          _vip_plus_role="${DISCORD_VIP_PLUS_ROLE_ID:-0}"
          _capper_channel="${DISCORD_CAPPER_CHANNEL_ID:-0}"
          printf '%s\n' \
            "NODE_ENV=production" \
            "UNIT_TALK_APP_ENV=production" \
            "UNIT_TALK_API_URL=http://api:4000" \
            "SUPABASE_URL=$SUPABASE_URL" \
            "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" \
            "UNIT_TALK_API_RUNTIME_MODE=fail_closed" \
            "UNIT_TALK_INGESTOR_RUNTIME_MODE=fail_closed" \
            "UNIT_TALK_WORKER_RUNTIME_MODE=fail_closed" \
            "UNIT_TALK_DISCORD_BOT_RUNTIME_MODE=fail_closed" \
            "UNIT_TALK_API_RATE_LIMIT_STORE=supabase_rpc" \
            "UNIT_TALK_API_RATE_LIMIT_KEY_STRATEGY=authenticated_identity" \
            "UNIT_TALK_INGESTOR_AUTORUN=true" \
            "UNIT_TALK_INGESTOR_MAX_CYCLES=0" \
            "UNIT_TALK_INGESTOR_SCHEDULING_ENABLED=true" \
            "UNIT_TALK_INGESTOR_PEAK_POLL_MS=30000" \
            "UNIT_TALK_INGESTOR_OFFPEAK_POLL_MS=300000" \
            "UNIT_TALK_INGESTOR_PEAK_START_HOUR_ET=12" \
            "UNIT_TALK_INGESTOR_PEAK_END_HOUR_ET=24" \
            "UNIT_TALK_INGESTOR_PINNACLE_ONLY_PEAK=true" \
            "UNIT_TALK_WORKER_ID=worker-prod" \
            "UNIT_TALK_WORKER_AUTORUN=true" \
            "UNIT_TALK_WORKER_MAX_CYCLES=0" \
            "UNIT_TALK_WORKER_ADAPTER=discord" \
            "UNIT_TALK_WORKER_DRY_RUN=false" \
            "UNIT_TALK_DISTRIBUTION_TARGETS=$_dist_targets" \
            "UNIT_TALK_DISCORD_TARGET_MAP=$_target_map" \
            "UNIT_TALK_ENABLED_TARGETS=${_enabled_targets:-best-bets}" \
            "DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN" \
            "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" \
            "DISCORD_GUILD_ID=$_guild_id" \
            "DISCORD_CAPPER_ROLE_ID=$_capper_role" \
            "DISCORD_VIP_ROLE_ID=$_vip_role" \
            "DISCORD_VIP_PLUS_ROLE_ID=$_vip_plus_role" \
            "DISCORD_CAPPER_CHANNEL_ID=$_capper_channel" \
            "DISCORD_OPERATOR_ROLE_ID=${DISCORD_OPERATOR_ROLE_ID:-0}" \
            "UNIT_TALK_BOT_API_KEY=$UNIT_TALK_BOT_API_KEY" \
            "UNIT_TALK_INGESTOR_API_KEY=$UNIT_TALK_INGESTOR_API_KEY" \
            "SGO_API_KEY=$SGO_API_KEY" \
            "SGO_API_KEY_FALLBACK=${SGO_API_KEY_FALLBACK:-}" \
            "SYNDICATE_MACHINE_ENABLED=true" \
            "UNIT_TALK_GRADING_CRON_AUTORUN=true" \
            "UNIT_TALK_OPS_ALERT_WEBHOOK_URL=${UNIT_TALK_OPS_ALERT_WEBHOOK_URL:-}" \
            "CADDY_DOMAIN=${CADDY_DOMAIN:-}" \
            "UNIT_TALK_BUILD_TIMESTAMP=${BUILD_TIMESTAMP:-}" \
            "UNIT_TALK_DEPLOYMENT_ID=${IMAGE_TAG:-}" \
            | ssh "$DEPLOY_USER@$DEPLOY_HOST" \
                "cat > '$DEPLOY_PATH/.env.production' && chmod 600 '$DEPLOY_PATH/.env.production' && echo 'env.production written'"

      - name: Authenticate GHCR on remote
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: printf '%s' "$GHCR_PAT" | ssh "$DEPLOY_USER@$DEPLOY_HOST" 'docker login ghcr.io -u griff843 --password-stdin'

      - name: Promote all production containers
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
          ROLLBACK_TAG: ${{ inputs.rollback_tag }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu && cd '$DEPLOY_PATH' && \
             docker rm -f caddy 2>/dev/null || true && \
             printf '%s\n' '$IMAGE_TAG' > .unit-talk-release && \
             UNIT_TALK_IMAGE_TAG='$IMAGE_TAG' docker compose pull && \
             UNIT_TALK_IMAGE_TAG='$IMAGE_TAG' docker compose up -d --remove-orphans"
          for attempt in $(seq 1 30); do
            if ssh "$DEPLOY_USER@$DEPLOY_HOST" "curl -fsS http://localhost:4000/health >/dev/null 2>&1"; then
              exit 0
            fi
            sleep 10
          done
          if [ -n "$ROLLBACK_TAG" ]; then
            bash deploy/rollback.sh --tag "$ROLLBACK_TAG" --host "$DEPLOY_HOST" --user "$DEPLOY_USER" --path "$DEPLOY_PATH"
          fi
          exit 1

  smoke:
    name: Post-deploy functional smoke
    needs: promote
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.UNIT_TALK_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Run post-deploy functional smoke via SSH
        run: |
          # Curl from inside server — Hetzner Cloud firewall blocks port 4000 from runner IPs
          RESULT=$(ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "HTTP=\$(curl -o /tmp/smoke-health.json -w '%{http_code}' -s --max-time 30 http://localhost:4000/health 2>/dev/null || echo '000'); \
             BODY=\$(cat /tmp/smoke-health.json 2>/dev/null | head -c 2000 || echo '{}'); \
             echo \"{\\\"httpStatus\\\":\$HTTP,\\\"body\\\":\$(echo \"\$BODY\" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo '\"{}\"')}\"")
          echo "Raw smoke result: $RESULT"
          HTTP_STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('httpStatus',0))")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo '{"verdict":"PASS","httpStatus":200,"checks":[{"name":"health 200","passed":true}]}' | tee smoke-result.json
          else
            echo "{\"verdict\":\"FAIL\",\"httpStatus\":$HTTP_STATUS,\"checks\":[{\"name\":\"health 200\",\"passed\":false,\"detail\":\"HTTP $HTTP_STATUS\"}]}" | tee smoke-result.json
            echo "::error::Post-deploy smoke FAILED — health returned HTTP $HTTP_STATUS (expected 200)"
            exit 1
          fi

      - name: Upload smoke result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-result-${{ github.run_id }}.json
          path: smoke-result.json
          retention-days: 30
