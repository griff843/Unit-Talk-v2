name: File Scope Lock Check

# Validates that PR changed files do not overlap with active lane manifests'
# file_scope_lock arrays. Prevents concurrent edits to the same files across
# parallel lanes.
#
# This is a CI-time enforcement of the advisory lock that ops:lane:start
# checks at lane creation. Without this, Codex or Claude can push commits
# touching files locked by another active lane.
#
# Only active lanes are checked (status: started, in_progress, in_review,
# blocked, reopened). Done/merged lanes are ignored.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: File scope lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check file scope overlaps
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const MANIFEST_DIR = 'docs/06_status/lanes';
            const ACTIVE_STATUSES = new Set([
              'started', 'in_progress', 'in_review', 'blocked', 'reopened'
            ]);

            // 1. Get PR changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 300
            });
            const changedFiles = files.map(f => f.filename);

            // 2. Get PR branch name to identify its own lane
            const prBranch = context.payload.pull_request.head.ref;

            // 3. Read all active lane manifests
            const manifests = [];
            if (fs.existsSync(MANIFEST_DIR)) {
              for (const file of fs.readdirSync(MANIFEST_DIR)) {
                if (!file.endsWith('.json')) continue;
                try {
                  const content = fs.readFileSync(
                    path.join(MANIFEST_DIR, file), 'utf8'
                  );
                  const manifest = JSON.parse(content);
                  if (ACTIVE_STATUSES.has(manifest.status)) {
                    manifests.push(manifest);
                  }
                } catch {
                  // Skip malformed manifests
                }
              }
            }

            // 4. Check for overlaps (skip this PR's own lane)
            const conflicts = [];
            for (const manifest of manifests) {
              // Don't flag a PR against its own lane
              if (manifest.branch === prBranch) continue;

              const locks = manifest.file_scope_lock || [];
              if (locks.length === 0) continue;

              for (const changed of changedFiles) {
                for (const lock of locks) {
                  // Exact match or prefix match (directory lock)
                  const normalized = lock.replace(/\\/g, '/');
                  if (changed === normalized ||
                      changed.startsWith(normalized + '/') ||
                      normalized.endsWith('/**') &&
                        changed.startsWith(normalized.slice(0, -3))) {
                    conflicts.push({
                      file: changed,
                      locked_by: manifest.issue_id,
                      lane_branch: manifest.branch,
                      lock_pattern: lock
                    });
                  }
                }
              }
            }

            // 5. Report
            if (conflicts.length === 0) {
              core.info('No file scope lock conflicts detected.');
              return;
            }

            const lines = [
              '**FILE SCOPE LOCK CONFLICT**',
              '',
              'This PR modifies files locked by active lanes:',
              '',
              ...conflicts.map(c =>
                `- \`${c.file}\` locked by **${c.locked_by}** (branch: \`${c.lane_branch}\`, lock: \`${c.lock_pattern}\`)`
              ),
              '',
              'Resolve by: waiting for the other lane to merge, or coordinating scope with the lane owner.'
            ];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: lines.join('\n')
            });

            core.setFailed(
              `File scope conflict: ${conflicts.length} file(s) overlap with active lane locks.`
            );
