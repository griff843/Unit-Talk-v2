name: File Scope Lock Check

# Enforces lane file-scope locks for pull requests.
#
# The repo-owned guard checks two things:
# - this PR's changed files stay inside its own lane manifest file_scope_lock
#   or expected_proof_paths;
# - this PR's changed files do not overlap another active lane's file_scope_lock.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check:
    name: File scope lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect changed files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            fs.mkdirSync('.out', { recursive: true });
            fs.writeFileSync(
              '.out/file-scope-changed-files.txt',
              files.map((file) => file.filename).join('\n') + '\n',
              'utf8'
            );

      - name: Resolve trusted guard script
        # The PR under evaluation cannot be trusted to supply the code that
        # evaluates it — a diff could touch an out-of-scope file *and* modify
        # this guard script (or its own lane manifest) in the same commit set
        # to make the check pass. Extract the base branch's copy of the guard
        # and execute that instead of the PR's own copy. Manifest content is
        # resolved the same way inside the script via --manifest-source git
        # (see resolveTrustedManifests in scripts/ci/file-scope-guard.ts).
        run: |
          mkdir -p .out
          if git show "origin/main:scripts/ci/file-scope-guard.ts" > .out/trusted-file-scope-guard.ts 2>/dev/null; then
            echo "Using base-branch (origin/main) copy of file-scope-guard.ts"
          else
            echo "::warning::Base branch has no scripts/ci/file-scope-guard.ts yet — falling back to this PR's own copy. Expected only for the PR that introduces the guard; every later PR is evaluated against main's copy once this merges."
            cp scripts/ci/file-scope-guard.ts .out/trusted-file-scope-guard.ts
          fi

      - name: Check file scope locks
        id: file_scope_guard
        env:
          FILE_SCOPE_PR_BRANCH: ${{ github.head_ref }}
        run: |
          pnpm exec tsx .out/trusted-file-scope-guard.ts \
            --changed-files-file .out/file-scope-changed-files.txt \
            --output-json .out/file-scope-result.json \
            --base origin/main \
            --head HEAD \
            --manifest-source git

      - name: Comment on file scope failure
        if: failure() && steps.file_scope_guard.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const result = JSON.parse(fs.readFileSync('.out/file-scope-result.json', 'utf8'));
            const lines = [
              '**FILE SCOPE LOCK CONFLICT**',
              '',
              `Branch: \`${result.pr_branch}\``,
              result.own_manifest_issue
                ? `Lane: **${result.own_manifest_issue}**`
                : 'Lane: **not found**',
              '',
            ];

            if (result.errors.length > 0) {
              lines.push('Errors:', ...result.errors.map((error) => `- ${error}`), '');
            }

            if (result.outside_scope.length > 0) {
              lines.push('This PR modifies files outside its lane scope:', '');
              for (const violation of result.outside_scope) {
                lines.push(`- \`${violation.file}\` is not declared by **${violation.issue_id}**`);
              }
              lines.push('');
            }

            if (result.conflicts.length > 0) {
              lines.push('This PR modifies files locked by active lanes:', '');
              for (const conflict of result.conflicts) {
                lines.push(
                  `- \`${conflict.file}\` locked by **${conflict.locked_by}** ` +
                  `(branch: \`${conflict.lane_branch}\`, lock: \`${conflict.lock_pattern}\`)`
                );
              }
              lines.push('');
            }

            lines.push('Resolve by narrowing the diff, waiting for the other lane to merge, or coordinating scope with the lane owner.');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: lines.join('\n')
            });
