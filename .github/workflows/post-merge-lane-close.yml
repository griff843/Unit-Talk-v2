name: Post-Merge Lane Close

# On push to main, identify the associated lane manifest (if any) and
# auto-close it after truth-check passes. This is the "chain link" in the
# automation conveyor — the merge itself triggers lane closure.
#
# Step classification (adversarial review):
#   1. Identify merged lane     — hard-gate (no lane = exit 0 silently)
#   2. Run truth-check          — hard-gate (failure halts)
#   3. Close manifest           — hard-gate (must succeed)
#   4. Update Linear            — skipped (linear-auto-close.yml handles it)
#   5. Update Fibery            — skipped (fibery-sync-on-merge.yml handles it)
#
# Issue ID extraction:
#   1. Scans the head commit message for UTV2-\d+ patterns (case-insensitive):
#      - Branch name in merge commit (e.g., claude/utv2-670-stale-lane-alerter)
#      - Explicit close markers (Closes UTV2-###, Fixes UTV2-###)
#      - Conventional commit scope (e.g., feat(ops): UTV2-670)
#   2. If not found in the commit message, queries the GitHub API for the PR
#      associated with the merge commit and extracts the ID from the branch name
#      (format: */utv2-NNN-* or */UTV2-NNN-*). This handles squash-merges.
#   Only the FIRST matched ID is used (one commit = one lane).
#   If no issue ID can be extracted, a warning is posted and the workflow exits
#   cleanly (non-lane PRs should not fail the workflow).
#
# Truth-check failure handling:
#   When ops:truth-check returns exit code 1/3/4, the workflow:
#   - Posts a comment on the merged PR explaining why lane closure was blocked
#   - Fails the workflow (so CI reflects the gate outcome)
#   - Does NOT update the lane manifest or transition Linear
#
# Requirements:
#   - Repo secret LINEAR_API_TOKEN (for truth-check's Linear checks)
#   - GITHUB_TOKEN (automatic, needs pull-requests: write to post comments)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  lane-close:
    name: Auto-close merged lane
    runs-on: ubuntu-latest

    steps:
      - name: Extract issue ID from commit message and PR branch
        id: extract
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract the first UTV2-NNN identifier from the commit message.
          # Sources: branch name in merge line, close markers, conventional
          # commit scope, or any freeform mention.
          issue_id=$(echo "$COMMIT_MSG" | grep -oP '(?i)UTV2-\d+' | head -n 1 | tr '[:lower:]' '[:upper:]' || true)

          # If not found in commit message, query the GitHub API for the PR
          # branch name (format: */utv2-NNN-* or */UTV2-NNN-*).
          # This handles squash-merges and other commit styles that may not
          # include the issue ID in the commit message body.
          pr_number=""
          pr_branch=""
          if [ -z "$issue_id" ] || true; then
            # Always try to find the associated PR to get pr_number for later comment posting.
            api_resp=$(curl -sS \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" \
              2>/dev/null || echo "[]")

            pr_number=$(echo "$api_resp" | jq -r '.[0].number // empty' 2>/dev/null || true)
            pr_branch=$(echo "$api_resp" | jq -r '.[0].head.ref // empty' 2>/dev/null || true)

            if [ -z "$issue_id" ] && [ -n "$pr_branch" ]; then
              # Try to extract UTV2-NNN from branch name: claude/utv2-NNN-... or utv2-NNN-...
              branch_issue=$(echo "$pr_branch" | grep -oiP '(?<![a-zA-Z])utv2-\d+' | head -n 1 | tr '[:lower:]' '[:upper:]' || true)
              if [ -n "$branch_issue" ]; then
                issue_id="$branch_issue"
                echo "::notice title=post-merge-lane-close::Found issue $issue_id from PR branch $pr_branch"
              fi
            fi
          fi

          if [ -z "$issue_id" ]; then
            echo "::notice title=post-merge-lane-close::No UTV2-### found in commit message or PR branch. Nothing to close."
            echo "issue_id=" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=post-merge-lane-close::Found issue $issue_id"
            echo "issue_id=$issue_id" >> "$GITHUB_OUTPUT"
          fi

          # Always emit pr_number so later steps can post comments
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset sync.yml to neutral on main
        # Always run — every squash merge to main rewrites .ops/sync.yml with the
        # merged PR's issue ID, causing all in-flight branches to conflict on that
        # file. Resetting to issues: [] immediately after merge keeps main neutral
        # so subsequent branches only conflict if they have actual content changes.
        run: |
          neutral=$(cat <<'YAML'
version: 1
approval:
  allow_multiple_issues: true
  skip_sync_required: false
entities:
  issues: []
  findings: []
  controls: []
  proofs: []
YAML
)
          current=$(cat .ops/sync.yml 2>/dev/null || echo "")
          if [ "$current" = "$neutral" ]; then
            echo "::notice title=post-merge-lane-close::sync.yml already neutral — no reset needed."
          else
            echo "$neutral" > .ops/sync.yml
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .ops/sync.yml
            git commit -m "ops: reset sync.yml to neutral after merge [skip ci]"
            git push
            echo "::notice title=post-merge-lane-close::sync.yml reset to neutral."
          fi

      - name: Check lane manifest exists
        if: steps.extract.outputs.issue_id != ''
        id: manifest
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
        run: |
          manifest_path="docs/06_status/lanes/${ISSUE_ID}.json"
          if [ ! -f "$manifest_path" ]; then
            echo "::notice title=post-merge-lane-close::No manifest at $manifest_path. Nothing to close."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$manifest_path" >> "$GITHUB_OUTPUT"
          fi

      - name: Check manifest status
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true'
        id: status
        env:
          MANIFEST_PATH: ${{ steps.manifest.outputs.path }}
        run: |
          status=$(jq -r '.status' "$MANIFEST_PATH")
          echo "::notice title=post-merge-lane-close::Manifest status: $status"

          if [ "$status" = "done" ]; then
            echo "::notice title=post-merge-lane-close::Lane already done. Skipping."
            echo "closeable=false" >> "$GITHUB_OUTPUT"
          elif [ "$status" = "in_review" ] || [ "$status" = "merged" ] || [ "$status" = "started" ] || [ "$status" = "in_progress" ] || [ "$status" = "reopened" ]; then
            echo "closeable=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=post-merge-lane-close::Status '$status' is not closeable. Skipping."
            echo "closeable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run truth-check (hard-gate)
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true'
        id: truth_check
        # continue-on-error so the "Post PR comment on failure" step can run
        # before the workflow is failed. The "Fail on truth-check failure" step
        # below re-raises the failure after the comment is posted.
        continue-on-error: true
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail

          # Run truth-check and capture both output and exit code
          truth_output=$(pnpm ops:truth-check "$ISSUE_ID" --json 2>&1) || exit_code=$?
          exit_code=${exit_code:-0}

          echo "$truth_output"
          echo "truth_output<<TRUTH_EOF" >> "$GITHUB_OUTPUT"
          echo "$truth_output" >> "$GITHUB_OUTPUT"
          echo "TRUTH_EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

          case $exit_code in
            0)
              echo "::notice title=post-merge-lane-close::Truth-check PASSED for $ISSUE_ID"
              ;;
            2)
              # Ineligible — wrong status, not an error
              echo "::notice title=post-merge-lane-close::Truth-check ineligible for $ISSUE_ID (exit 2). Skipping close."
              ;;
            1|3|4)
              echo "::warning title=post-merge-lane-close::Truth-check FAILED for $ISSUE_ID (exit $exit_code). Lane will NOT be closed."
              exit $exit_code
              ;;
            *)
              echo "::warning title=post-merge-lane-close::Truth-check returned unexpected exit code $exit_code for $ISSUE_ID."
              exit $exit_code
              ;;
          esac

      - name: Post PR comment on truth-check failure
        # Run when truth-check failed (outcome is 'failure') and a PR number
        # was resolved. Warns the author why lane closure was blocked and what
        # to do next. This step must run BEFORE the re-raise step below so the
        # comment lands even when the workflow ultimately fails.
        if: >-
          steps.truth_check.outcome == 'failure' &&
          steps.extract.outputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.extract.outputs.pr_number }}
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          TC_EXIT: ${{ steps.truth_check.outputs.exit_code }}
        run: |
          body="Lane closure blocked — \`ops:truth-check\` returned exit code ${TC_EXIT} for ${ISSUE_ID}. Resolve the failing checks and re-run the workflow manually or push a new commit."

          curl -sS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -d "{\"body\": $(echo "$body" | jq -Rs .)}" \
            > /dev/null

          echo "::notice title=post-merge-lane-close::Posted blocking comment on PR #${PR_NUMBER}"

      - name: Fail on truth-check failure
        # Re-raise the failure after the PR comment has been posted.
        # Keeps the workflow status red so CI reflects the gate outcome.
        if: steps.truth_check.outcome == 'failure'
        run: |
          echo "::error title=post-merge-lane-close::Truth-check failed (exit ${{ steps.truth_check.outputs.exit_code }}) — lane NOT closed."
          exit "${{ steps.truth_check.outputs.exit_code }}"

      - name: Update manifest to done
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true' && steps.truth_check.outputs.exit_code == '0'
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          MANIFEST_PATH: ${{ steps.manifest.outputs.path }}
          TRUTH_OUTPUT: ${{ steps.truth_check.outputs.truth_output }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          node -e "
            const fs = require('fs');
            const path = process.env.MANIFEST_PATH;
            const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
            const now = new Date().toISOString();

            // Parse truth-check output — find the last JSON line
            const truthLines = (process.env.TRUTH_OUTPUT || '').split('\n');
            let truthResult = null;
            for (let i = truthLines.length - 1; i >= 0; i--) {
              const line = truthLines[i].trim();
              if (line.startsWith('{')) {
                try { truthResult = JSON.parse(line); break; } catch {}
              }
            }

            // Update manifest fields
            manifest.status = 'done';
            manifest.closed_at = now;
            manifest.heartbeat_at = now;

            // Append truth-check history entry
            if (!Array.isArray(manifest.truth_check_history)) {
              manifest.truth_check_history = [];
            }
            manifest.truth_check_history.push({
              timestamp: now,
              runner: 'post-merge-lane-close',
              merge_sha: process.env.MERGE_SHA,
              verdict: truthResult?.verdict ?? 'pass',
              exit_code: 0,
              checks: truthResult?.checks ?? [],
            });

            fs.writeFileSync(path, JSON.stringify(manifest, null, 2) + '\n');
            console.log('Manifest updated: status=done closed_at=' + now);
          "

      - name: Commit and push manifest change
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true' && steps.truth_check.outputs.exit_code == '0'
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          MANIFEST_PATH: ${{ steps.manifest.outputs.path }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST_PATH"

          # Check if there are actually changes to commit
          if git diff --cached --quiet; then
            echo "::notice title=post-merge-lane-close::No manifest changes to commit (already up to date)."
          else
            git commit -m "ops: auto-close lane $ISSUE_ID [skip ci]"
            git push
            echo "::notice title=post-merge-lane-close::Lane $ISSUE_ID closed and manifest committed."
          fi

      - name: Post summary annotation
        if: always() && steps.extract.outputs.issue_id != ''
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          MANIFEST_EXISTS: ${{ steps.manifest.outputs.exists }}
          CLOSEABLE: ${{ steps.status.outputs.closeable }}
          TC_EXIT: ${{ steps.truth_check.outputs.exit_code }}
        run: |
          if [ "$MANIFEST_EXISTS" != "true" ]; then
            echo "::notice title=post-merge-lane-close::Summary: No manifest for $ISSUE_ID — no action taken."
          elif [ "$CLOSEABLE" != "true" ]; then
            echo "::notice title=post-merge-lane-close::Summary: $ISSUE_ID manifest not in closeable state — no action taken."
          elif [ "$TC_EXIT" = "0" ]; then
            echo "::notice title=post-merge-lane-close::Summary: $ISSUE_ID lane closed successfully after truth-check pass."
          elif [ "$TC_EXIT" = "2" ]; then
            echo "::notice title=post-merge-lane-close::Summary: $ISSUE_ID truth-check ineligible — no action taken."
          else
            echo "::warning title=post-merge-lane-close::Summary: $ISSUE_ID truth-check failed (exit $TC_EXIT) — lane NOT closed."
          fi
