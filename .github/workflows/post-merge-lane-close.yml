name: Post-Merge Lane Close

# On push to main, identify the associated lane manifest (if any) and
# auto-close it after truth-check passes. This is the "chain link" in the
# automation conveyor — the merge itself triggers lane closure.
#
# Step classification (adversarial review):
#   1. Identify merged lane     — hard-gate (no lane = exit 0 silently)
#   2. Run lane closeout        — hard-gate (failure halts)
#   3. Commit closeout state    — hard-gate (must succeed)
#   4. Update Linear            — skipped (linear-auto-close.yml handles it)
#
# Issue ID extraction:
#   1. Scans the head commit message for UTV2-\d+ patterns (case-insensitive):
#      - Branch name in merge commit (e.g., claude/utv2-670-stale-lane-alerter)
#      - Explicit close markers (Closes UTV2-###, Fixes UTV2-###)
#      - Conventional commit scope (e.g., feat(ops): UTV2-670)
#   2. If not found in the commit message, queries the GitHub API for the PR
#      associated with the merge commit and extracts the ID from the branch name
#      (format: */utv2-NNN-* or */UTV2-NNN-*). This handles squash-merges.
#   Only the FIRST matched ID is used (one commit = one lane).
#   If no issue ID can be extracted, a warning is posted and the workflow exits
#   cleanly (non-lane PRs should not fail the workflow).
#
# Closeout failure handling:
#   When ops:lane-close --repair-merged fails, the workflow:
#   - Posts a comment on the merged PR explaining why lane closure was blocked
#   - Fails the workflow (so CI reflects the gate outcome)
#   - Does NOT commit lane manifest changes
#
# Requirements:
#   - Repo secret LINEAR_API_TOKEN (for truth-check's Linear checks)
#   - Repo secret SYNC_BOT_TOKEN (PAT with repo scope — allows git push to bypass
#     branch protection; must be a token from a repo admin/owner). Falls back to
#     GITHUB_TOKEN if not set, but git push will be blocked by branch protection.
#   - GITHUB_TOKEN (automatic, needs pull-requests: write to post comments)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      issue_id:
        description: "Issue ID to manually close (e.g. UTV2-961)"
        required: true
        type: string

concurrency:
  group: merge-closeout-mutex
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  lane-close:
    name: Auto-close merged lane
    runs-on: ubuntu-latest
    # Never re-trigger on bot housekeeping commits — prevents infinite push loops.
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Extract issue ID from commit message and PR branch
        id: extract
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_ISSUE_ID: ${{ inputs.issue_id }}
        run: |
          # workflow_dispatch: use the provided issue_id directly.
          if [ -n "$DISPATCH_ISSUE_ID" ]; then
            issue_id=$(echo "$DISPATCH_ISSUE_ID" | tr '[:lower:]' '[:upper:]')
            echo "::notice title=post-merge-lane-close::Manual replay for $issue_id"
            echo "issue_id=$issue_id" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # push trigger: extract from commit message then PR branch (handles squash merges).
          issue_id=$(echo "$COMMIT_MSG" | grep -oP '(?i)UTV2-\d+' | head -n 1 | tr '[:lower:]' '[:upper:]' || true)

          pr_number=""
          pr_branch=""
          # Always resolve the associated PR to get pr_number for comment posting.
          api_resp=$(curl -sS \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" \
            2>/dev/null || echo "[]")

          pr_number=$(echo "$api_resp" | jq -r '.[0].number // empty' 2>/dev/null || true)
          pr_branch=$(echo "$api_resp" | jq -r '.[0].head.ref // empty' 2>/dev/null || true)

          if [ -z "$issue_id" ] && [ -n "$pr_branch" ]; then
            branch_issue=$(echo "$pr_branch" | grep -oiP '(?<![a-zA-Z])utv2-\d+' | head -n 1 | tr '[:lower:]' '[:upper:]' || true)
            if [ -n "$branch_issue" ]; then
              issue_id="$branch_issue"
              echo "::notice title=post-merge-lane-close::Found issue $issue_id from PR branch $pr_branch"
            fi
          fi

          if [ -z "$issue_id" ]; then
            echo "::notice title=post-merge-lane-close::No UTV2-### found in commit message or PR branch. Nothing to close."
            echo "issue_id=" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=post-merge-lane-close::Found issue $issue_id"
            echo "issue_id=$issue_id" >> "$GITHUB_OUTPUT"
          fi

          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # SYNC_BOT_TOKEN is a PAT from the repo owner (admin bypass on classic
          # branch protection). Falls back to GITHUB_TOKEN if not configured, but
          # the git push steps will then be blocked by branch protection.
          token: ${{ secrets.SYNC_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check lane manifest exists
        if: steps.extract.outputs.issue_id != ''
        id: manifest
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
        run: |
          manifest_path="docs/06_status/lanes/${ISSUE_ID}.json"
          if [ ! -f "$manifest_path" ]; then
            echo "::notice title=post-merge-lane-close::No manifest at $manifest_path. Nothing to close."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$manifest_path" >> "$GITHUB_OUTPUT"
          fi

      - name: Check manifest status
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true'
        id: status
        env:
          MANIFEST_PATH: ${{ steps.manifest.outputs.path }}
        run: |
          status=$(jq -r '.status' "$MANIFEST_PATH")
          echo "::notice title=post-merge-lane-close::Manifest status: $status"

          if [ "$status" = "done" ]; then
            echo "::notice title=post-merge-lane-close::Lane already done. Skipping."
            echo "closeable=false" >> "$GITHUB_OUTPUT"
          elif [ "$status" = "in_review" ] || [ "$status" = "merged" ] || [ "$status" = "started" ] || [ "$status" = "in_progress" ] || [ "$status" = "reopened" ]; then
            echo "closeable=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=post-merge-lane-close::Status '$status' is not closeable. Skipping."
            echo "closeable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run lane closeout (hard-gate)
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true'
        id: lane_close
        # continue-on-error so the "Post PR comment on failure" step can run
        # before the workflow is failed. The "Fail on truth-check failure" step
        # below re-raises the failure after the comment is posted.
        continue-on-error: true
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail

          # Repair stale merged-lane state from the authoritative PR merge SHA,
          # then run the normal lane-close truth gate. This keeps post-merge
          # automation on the same closeout path operators use manually.
          close_output=$(pnpm ops:lane-close "$ISSUE_ID" --repair-merged --explain 2>&1) || exit_code=$?
          exit_code=${exit_code:-0}

          echo "$close_output"
          echo "close_output<<CLOSE_EOF" >> "$GITHUB_OUTPUT"
          echo "$close_output" >> "$GITHUB_OUTPUT"
          echo "CLOSE_EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

          case $exit_code in
            0)
              echo "::notice title=post-merge-lane-close::Lane closeout PASSED for $ISSUE_ID"
              ;;
            *)
              echo "::warning title=post-merge-lane-close::Lane closeout FAILED for $ISSUE_ID (exit $exit_code). Lane will NOT be closed."
              exit $exit_code
              ;;
          esac

      - name: Post PR comment on lane closeout failure
        # Run when lane-close failed (outcome is 'failure') and a PR number
        # was resolved. Warns the author why lane closure was blocked and what
        # to do next. This step must run BEFORE the re-raise step below so the
        # comment lands even when the workflow ultimately fails.
        if: >-
          steps.lane_close.outcome == 'failure' &&
          steps.extract.outputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.extract.outputs.pr_number }}
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          LC_EXIT: ${{ steps.lane_close.outputs.exit_code }}
        run: |
          body="Lane closure blocked — \`ops:lane-close --repair-merged\` returned exit code ${LC_EXIT} for ${ISSUE_ID}. Resolve the failing checks and re-run the workflow manually or push a new commit."

          curl -sS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -d "{\"body\": $(echo "$body" | jq -Rs .)}" \
            > /dev/null

          echo "::notice title=post-merge-lane-close::Posted blocking comment on PR #${PR_NUMBER}"

      - name: Fail on lane closeout failure
        # Re-raise the failure after the PR comment has been posted.
        # Keeps the workflow status red so CI reflects the gate outcome.
        if: steps.lane_close.outcome == 'failure'
        run: |
          echo "::error title=post-merge-lane-close::Lane closeout failed (exit ${{ steps.lane_close.outputs.exit_code }}) — lane NOT closed."
          exit "${{ steps.lane_close.outputs.exit_code }}"

      - name: Commit and push manifest change
        if: steps.extract.outputs.issue_id != '' && steps.manifest.outputs.exists == 'true' && steps.status.outputs.closeable == 'true' && steps.lane_close.outputs.exit_code == '0'
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          MANIFEST_PATH: ${{ steps.manifest.outputs.path }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST_PATH"

          # Remove per-issue sync file now that the lane is closed.
          per_issue_sync=".ops/sync/${ISSUE_ID}.yml"
          if [ -f "$per_issue_sync" ]; then
            git rm --force "$per_issue_sync"
            echo "::notice title=post-merge-lane-close::Removed per-issue sync file $per_issue_sync"
          fi

          if git diff --cached --quiet; then
            echo "::notice title=post-merge-lane-close::No changes to commit (already up to date)."
          else
            git commit -m "chore(lanes): close $ISSUE_ID — lane closed, sync file removed"
            git push
            echo "::notice title=post-merge-lane-close::Lane $ISSUE_ID closed and manifest committed."
          fi

      - name: Post summary annotation
        if: always() && steps.extract.outputs.issue_id != ''
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          MANIFEST_EXISTS: ${{ steps.manifest.outputs.exists }}
          CLOSEABLE: ${{ steps.status.outputs.closeable }}
          LC_EXIT: ${{ steps.lane_close.outputs.exit_code }}
        run: |
          if [ "$MANIFEST_EXISTS" != "true" ]; then
            echo "::notice title=post-merge-lane-close::Summary: No manifest for $ISSUE_ID — no action taken."
          elif [ "$CLOSEABLE" != "true" ]; then
            echo "::notice title=post-merge-lane-close::Summary: $ISSUE_ID manifest not in closeable state — no action taken."
          elif [ "$LC_EXIT" = "0" ]; then
            echo "::notice title=post-merge-lane-close::Summary: $ISSUE_ID lane closed successfully."
          else
            echo "::warning title=post-merge-lane-close::Summary: $ISSUE_ID lane closeout failed (exit $LC_EXIT) — lane NOT closed."
          fi
