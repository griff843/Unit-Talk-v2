schema_version: 1
lane_id: verification
lane_type: verification
allowed_path_globs:
  - packages/verification/**
  - scripts/**
  - proof/**
  - .lane/**
  - .ops/sync/**
  - docs/06_status/lanes/**
  - docs/06_status/proof/**
  - docs/06_status/**EVIDENCE**
  - docs/06_status/**EVIDENCE-BUNDLE**
  - apps/api/src/database-smoke.test.ts
  - package.json
forbidden_path_globs:
  - supabase/migrations/**
  - database/migrations/**
  - packages/**/database.types.ts
required_proof_artifacts:
  - diff-summary.md
  - verification.log
  - validation-report.md
ci_requirements:
  - pnpm verify
merge_policy: Verification tooling may merge independently when runtime behavior is untouched.
concurrency_notes: Coordinate if changing shared CI or lane contract scripts.
codex_guidance: |
  DO NOT use this lane type for changes to apps/api/src/** (except database-smoke.test.ts).
  This lane only permits packages/verification/**, scripts/**, and proof/docs paths.
  For any apps/api/src/ test fix, use lane_type: runtime instead.
  Proof files must be .md (not .log) — runtime-verifier-gate ignores non-.md files.
