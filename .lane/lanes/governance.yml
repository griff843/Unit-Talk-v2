schema_version: 1
lane_id: governance
lane_type: governance
allowed_path_globs:
  - .agents/skills/**
  - .claude/agents/**
  - .claude/commands/**
  - .claude/hooks/**
  - .claude/settings.json
  - .github/**
  - .lane/**
  - .ops/**
  - .gitignore
  - .env.example
  - eslint.config.*
  - scripts/**
  - deploy/**
  - docs/governance/**
  - docs/05_operations/**
  - docs/06_status/lanes/**
  - docs/06_status/proof/**
  # Evidence bundles + the debt ledger they close against — added UTV2-1524.
  # DEBT-025: this allowlist never included KNOWN_DEBT.md, so every
  # governance-lane PR editing it failed "Lane authority" (reproduces on PR
  # #1187 and #1191). Closed here.
  - docs/06_status/evidence/**
  - docs/06_status/UTV2-*-EVIDENCE-BUNDLE.md
  - docs/06_status/KNOWN_DEBT.md
  - docs/06_status/incidents/**
  # UTV2-1541: docs/06_status/incidents/** (lowercase, added UTV2-1524) never
  # matched this repo's actual incident-log directory, docs/06_status/INCIDENTS/**
  # (uppercase, in use since INC-2026-04-10) -- matchesAny() in lane-contract.ts
  # uses micromatch.isMatch() with no `nocase` option, so the match is
  # case-sensitive. Every governance lane touching a real incident doc failed
  # Lane Authority. Added case-correct entry below; the lowercase entry above is
  # left in place in case any historical tooling still references it.
  - docs/06_status/INCIDENTS/**
  # UTV2-1541: AGENTS.md was never in this allowlist at all, so any governance
  # lane updating agent-facing dispatch docs (e.g. after a concurrency-ceiling
  # change) failed Lane Authority with no override available (a File Scope Lock
  # override cannot resolve Lane Authority -- they are separate controls).
  - AGENTS.md
  - docs/06_status/readiness/**
  - docs/06_status/gap-map/**
  - docs/06_status/SYSTEM_STATE.md
  - docs/06_status/CURRENT_STATE.md
  - docs/06_status/qa-roadmap-expansion.md
  - docs/06_status/model-performance-log.md
  # OS v1 governance-lock document — added UTV2-1528 (PR #1199 hit the
  # same DEBT-025-class gap: no lane allowed a top-level docs/06_status/*.md
  # ratification doc).
  - docs/06_status/OS_V1_LOCK.md
  # Certification authority documents — governance lanes author/reconcile these
  # (P1–P5 certification records and the certification board). Added UTV2-1195.
  - docs/06_status/programs/**
  - docs/06_status/CERT_BOARD.md
  # Constitutional docs — drift audits, gap register, implementation matrix. Added UTV2-1199.
  - docs/00_constitution/**
  # Audit + PM decision packet docs — added UTV2-1384 (the issue's own File Scope declared
  # this path, but no lane manifest previously allowed it).
  - docs/06_status/audits/**
  # Architecture policy and doctrine docs — added UTV2-1253.
  - docs/02_architecture/**
  # Package-root CLAUDE.md files for governance/doc reconciliation lanes. Added UTV2-1199.
  - packages/db/CLAUDE.md
  - packages/contracts/CLAUDE.md
  - .claude/.state-stamp
  - docs/archive/**
  - CLAUDE.md
  - docs/START_HERE.md
  - docs/CODEBASE_GUIDE.md
  - package.json
  - pnpm-lock.yaml
  - pnpm-workspace.yaml
  - tsconfig*.json
  - .nvmrc
  - Dockerfile
  - apps/**/package.json
  - packages/events/**
  - packages/intelligence/**
  - packages/config/**
  - packages/contracts/**
  - packages/db/src/**
  - packages/domain/src/**
  - packages/invariants/**
  - db/migrations-rollback/**
  - apps/api/src/t1-proof-*.test.ts
  - apps/api/src/authority-enforcement.ts
forbidden_path_globs:
  - supabase/migrations/**
  - database/migrations/**
  - packages/**/database.types.ts
required_proof_artifacts:
  - diff-summary.md
  - verification.md
ci_requirements:
  - pnpm verify
merge_policy: Requires explicit issue scope for changes that affect CI or lane policy.
concurrency_notes: Coordinate with active lanes before changing shared orchestration rules.
