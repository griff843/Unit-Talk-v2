schema_version: 1
lane_id: runtime
lane_type: runtime
allowed_path_globs:
  - apps/api/**
  - apps/alert-agent/**
  - apps/ingestor/**
  - apps/worker/**
  - packages/alert-runtime/**
  - packages/config/**
  - packages/events/**
  - packages/intelligence/**
  - packages/observability/**
  - scripts/**
  - .env.example
  - .env.container.example
  - docs/05_operations/PROVIDER_KNOWLEDGE_BASE.md
  - .ops/sync/**
  - docs/06_status/lanes/**
  - packages/db/src/**
  - packages/contracts/src/promotion.ts
  - .lane/lanes/**
  - .github/workflows/**
  - deploy/production/**
  - docs/06_status/proof/**
  - docs/06_status/readiness/**
  - package.json
forbidden_path_globs:
  - supabase/migrations/**
  - database/migrations/**
  - packages/**/database.types.ts
  - packages/domain/src/**
required_proof_artifacts:
  - diff-summary.md
  - verification.md
  - runtime-health.json
ci_requirements:
  - pnpm verify
merge_policy: Requires green verify and no active overlapping lane manifest.
concurrency_notes: May run beside non-overlapping UI, verification, and hygiene lanes.
codex_guidance: |
  Use this lane type for any change to apps/api/src/** (including test files).
  Proof files must be .md (not .log) — runtime-verifier-gate ignores non-.md files.
  Proof file must contain a ## Verification section header (not ## Commands).
  Proof file must explicitly mention "pnpm type-check" and "pnpm test".
