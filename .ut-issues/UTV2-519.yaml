rollback_plan: |
  Commit-level: revert the PR. Schema rollback order (run manually in the
  indicated sequence):
    1. DROP FUNCTION public.transition_pick_lifecycle(uuid, text, text, text, text, jsonb);
    2. ALTER TABLE public.pick_lifecycle DROP CONSTRAINT IF EXISTS pick_lifecycle_to_state_check;
       ALTER TABLE public.pick_lifecycle ADD CONSTRAINT pick_lifecycle_to_state_check CHECK (
         to_state in ('draft','validated','queued','posted','settled','voided')
       );
    3. Revert packages/db/src/lifecycle.ts to the prior sequential
       (updatePickLifecycleState + saveLifecycleEvent) implementation.
  Stranded awaiting_approval rows currently in live DB (24 as of 2026-04-10)
  are intentionally NOT touched by this migration pair and remain untouched
  on rollback. Cleanup is a separate hybrid-policy follow-up.

