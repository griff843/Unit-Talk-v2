sql_review_criteria: |
  1. pick_lifecycle_to_state_check swap (202604100004): drop + re-add. The new
     allow-list must include 'awaiting_approval' alongside the existing six
     states. Idempotent via DROP IF EXISTS + ADD. No data is mutated; no
     trigger is created; no index is changed. The from_state column on
     pick_lifecycle remains unconstrained (by design — see 202603200002).

  2. transition_pick_lifecycle RPC (202604100005): PL/pgSQL, implicit
     transaction. Behavior:
       - SELECT status FROM picks WHERE id = p_pick_id FOR UPDATE (row lock)
       - RAISE EXCEPTION PICK_NOT_FOUND (SQLSTATE P0001) if not found
       - RAISE EXCEPTION INVALID_LIFECYCLE_TRANSITION (P0001) if current
         status does not equal p_from_state
       - UPDATE picks SET status = p_to_state, updated_at = now()
       - INSERT INTO pick_lifecycle (...) RETURNING id
       - Return jsonb with { pickId, fromState, toState, eventId }
     Any RAISE rolls back both writes via PL/pgSQL exception semantics, so the
     UTV2-491 vs UTV2-519 constraint gap can no longer strand picks.status.
     Grant pattern matches 202604010005_submission_atomicity_rpc.sql:
     GRANT EXECUTE ... TO service_role. The TypeScript FSM in
     packages/db/src/lifecycle.ts remains the canonical FSM and is evaluated
     before the RPC is invoked — the RPC only guards the from_state race.

downstream_unlocks:
  - UTV2-494

pre_existing_failures: null

notes: |
  UTV2-491 (202604100003) added 'awaiting_approval' to picks_status_check but
  did NOT add it to the sibling pick_lifecycle_to_state_check constraint
  (originally declared in 202603200002 v2_schema_hardening). As a result the
  Phase 7A governance brake could successfully UPDATE picks.status to
  'awaiting_approval' (first write) but the subsequent INSERT into
  pick_lifecycle was rejected by Postgres with a CHECK violation. Because the
  two writes were not wrapped in a transaction in lifecycle.ts (lines 141-144),
  the status update committed and the DB was left structurally inconsistent:
  picks.status = 'awaiting_approval' with no matching lifecycle event, no
  'pick.governance_brake.applied' audit row, and HTTP 400 returned to callers.
  24 stranded rows currently exist in live DB as of 2026-04-10.

  Unit tests passed only because the InMemory repositories do not enforce
  Postgres CHECK constraints (InMemory drift). UTV2-494 Lane A and Lane C
  reproduced the failure against live Postgres on 2026-04-10.

  This PR takes three corrective steps:
    1. Migration 202604100004 extends pick_lifecycle_to_state_check to
       include 'awaiting_approval' (closes the UTV2-491 gap).
    2. Migration 202604100005 adds transition_pick_lifecycle RPC so the two
       lifecycle writes are wrapped in a single Postgres transaction.
    3. lifecycle.ts calls the atomic RPC first, then falls back to the
       pre-existing sequential path only when the repository throws the
       InMemory sentinel. Real DB errors from the atomic path are re-raised
       — no silent fallback that would mask Postgres rollback semantics.

  Scanner quiescence (SYSTEM_PICK_SCANNER_ENABLED=false in local.env since
  2026-04-10 21:15 UTC) is unchanged by this PR.

  The 24 stranded awaiting_approval rows are intentionally NOT mutated by
  this PR. Hybrid cleanup policy is deferred to a separate follow-up ticket.

  The new t1-proof-awaiting-approval.test.ts is not wired into the default
  pnpm test:db script (which currently targets only database-smoke.test.ts);
  it is invoked directly via:
    UNIT_TALK_APP_ENV=local npx tsx --test apps/api/src/t1-proof-awaiting-approval.test.ts
  This matches the invocation style of the existing t1-proof-atomicity.test.ts.
