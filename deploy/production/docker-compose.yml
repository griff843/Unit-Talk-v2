configs:
  grafana_loki_datasource:
    content: |
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100
          isDefault: true

services:
  api:
    image: ghcr.io/griff843/unit-talk-v2/api:${UNIT_TALK_IMAGE_TAG:?UNIT_TALK_IMAGE_TAG required}
    env_file:
      - .env.production
    environment:
      - LOKI_URL=http://loki:3100
    ports:
      - "${UNIT_TALK_API_HOST_PORT:-4000}:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 30s
      start_period: 30s
      retries: 5
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  worker:
    image: ghcr.io/griff843/unit-talk-v2/worker:${UNIT_TALK_IMAGE_TAG:?UNIT_TALK_IMAGE_TAG required}
    env_file:
      - .env.production
    environment:
      - LOKI_URL=http://loki:3100
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  ingestor:
    image: ghcr.io/griff843/unit-talk-v2/ingestor:${UNIT_TALK_IMAGE_TAG:?UNIT_TALK_IMAGE_TAG required}
    env_file:
      - .env.production
    environment:
      - LOKI_URL=http://loki:3100
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # UTV2-1284: heartbeat-based liveness. `pgrep -f node` only proved a process
    # existed, not that the cycle loop advanced — so a wedged loop reported
    # "healthy" for ~5.5h (2026-06-20). healthcheck.ts exits non-zero when the
    # per-cycle heartbeat is stale. The in-process watchdog force-exits on the
    # same signal so `restart: unless-stopped` recreates the container.
    healthcheck:
      test: ["CMD-SHELL", "node_modules/.bin/tsx apps/ingestor/src/healthcheck.ts || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 90s
      retries: 3
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  discord-bot:
    image: ghcr.io/griff843/unit-talk-v2/discord-bot:${UNIT_TALK_IMAGE_TAG:?UNIT_TALK_IMAGE_TAG required}
    env_file:
      - .env.production
    environment:
      - LOKI_URL=http://loki:3100
    restart: on-failure
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'

  grading-cron:
    image: ghcr.io/griff843/unit-talk-v2/api:${UNIT_TALK_IMAGE_TAG:?UNIT_TALK_IMAGE_TAG required}
    command: ["node_modules/.bin/tsx", "apps/api/src/grading-cron.ts"]
    env_file:
      - .env.production
    environment:
      - LOKI_URL=http://loki:3100
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'grading-cron' > /dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki-data:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - "127.0.0.1:3200:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana-data:/var/lib/grafana
    configs:
      - source: grafana_loki_datasource
        target: /etc/grafana/provisioning/datasources/loki.yml
    restart: unless-stopped
    depends_on:
      - loki
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    # CADDY_DOMAIN must reach the container for the {$CADDY_DOMAIN} site
    # address in the Caddyfile; without it Caddy fails to parse the config
    # and crash-loops. env_file matches the other services (future
    # hardening: narrow to just CADDY_DOMAIN — caddy is the public edge).
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.1'

networks:
  unit-talk:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
  caddy-data:
  caddy-config:
