services:
  api:
    image: ghcr.io/griff843/unit-talk-v2/api:${UNIT_TALK_IMAGE_TAG:?UNIT_TALK_IMAGE_TAG required}
    env_file:
      - .env.production
    ports:
      - "${UNIT_TALK_API_HOST_PORT:-4000}:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 30s
      start_period: 30s
      retries: 5
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  worker:
    image: ghcr.io/griff843/unit-talk-v2/worker:${UNIT_TALK_IMAGE_TAG:?UNIT_TALK_IMAGE_TAG required}
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  ingestor:
    image: ghcr.io/griff843/unit-talk-v2/ingestor:${UNIT_TALK_IMAGE_TAG:?UNIT_TALK_IMAGE_TAG required}
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  discord-bot:
    image: ghcr.io/griff843/unit-talk-v2/discord-bot:${UNIT_TALK_IMAGE_TAG:?UNIT_TALK_IMAGE_TAG required}
    env_file:
      - .env.production
    restart: on-failure
    depends_on:
      api:
        condition: service_healthy
    networks:
      - unit-talk
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.1'

networks:
  unit-talk:
    driver: bridge
