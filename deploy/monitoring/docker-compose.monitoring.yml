services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    volumes:
      - uptime-kuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - unit-talk
    restart: unless-stopped

volumes:
  uptime-kuma-data:

networks:
  unit-talk:
    external: true
    name: unit-talk_unit-talk
